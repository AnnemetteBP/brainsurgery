reference_value_keys:
  - from
  - from_a
  - from_b
  - left
  - right
  - of
  - target
  - target_a
  - target_b
  - to

reference_key_order:
  - from
  - from_a
  - from_b
  - left
  - right
  - of
  - target
  - target_a
  - target_b
  - to

top_level:
  no_payload_transforms:
    - exit
    - prefixes

transforms:
  assert:
    payload_start:
      empty_value_source: assert_expr_names
      open_brace: "{ "
    key_context:
      dynamic_source: assert_expr_names

  help:
    payload_start:
      empty_value_source: transform_names
      open_brace: "{ "
    key_context:
      keys:
        - assert
    value_context:
      help:
        source: transform_names
        committed_next:
          - "}"
      assert:
        source: assert_expr_names
        committed_next:
          - "}"

  prefixes:
    key_context:
      mode_selector:
        key: mode
        default:
          - mode
        values:
          list: []
          add:
            - alias
          remove:
            - alias
          rename:
            - from
            - to
    value_context:
      mode:
        source: static
        values:
          - list
          - add
          - remove
          - rename
      alias:
        source: model_aliases
      from:
        source: model_aliases
      to:
        source: model_aliases
