version: 1
name: synapse_torch_default

defaults:
  module_namespace: torch.nn
  functional_namespace: torch.nn.functional
  tensor_namespace: torch

ops:
  embedding:
    kind: module
    target: torch.nn.Embedding
    stateful: true
    constructor:
      num_embeddings: required
      embedding_dim: required
      padding_idx: optional
      max_norm: optional
      norm_type: optional
      scale_grad_by_freq: optional
      sparse: optional

  linear:
    kind: module
    target: torch.nn.Linear
    stateful: true
    constructor:
      in_features: required
      dim: required
      bias: optional

  layernorm:
    kind: module
    target: torch.nn.LayerNorm
    stateful: true
    constructor:
      normalized_shape: required
      eps: optional
      elementwise_affine: optional
      bias: optional

  dropout:
    kind: module
    target: torch.nn.Dropout
    stateful: false
    constructor:
      p: optional
      inplace: optional

  gelu:
    kind: functional
    target: torch.nn.functional.gelu
    stateful: false
    call:
      approximate: optional

  relu:
    kind: functional
    target: torch.nn.functional.relu
    stateful: false
    call:
      inplace: optional

  silu:
    kind: functional
    target: torch.nn.functional.silu
    stateful: false

  softmax:
    kind: functional
    target: torch.nn.functional.softmax
    stateful: false
    call:
      dim: required
      dtype: optional

  topk:
    kind: tensor_fn
    target: torch.topk
    stateful: false
    call:
      k: required
      dim: optional
      largest: optional
      sorted: optional

  zeros_like:
    kind: tensor_fn
    target: torch.zeros_like
    stateful: false

  attention:
    kind: functional
    target: torch.nn.functional.scaled_dot_product_attention
    stateful: false
    call:
      attn_mask: optional
      dropout_p: optional
      is_causal: optional
      scale: optional

  matmul:
    kind: tensor_fn
    target: torch.matmul
    stateful: false

  add:
    kind: tensor_fn
    target: torch.add
    stateful: false

  mul:
    kind: tensor_fn
    target: torch.mul
    stateful: false

  concat:
    kind: tensor_fn
    target: torch.cat
    stateful: false
    call:
      dim: optional

  split:
    kind: tensor_fn
    target: torch.split
    stateful: false
    call:
      split_size_or_sections: required
      dim: optional

  reshape:
    kind: tensor_method
    target: Tensor.reshape
    stateful: false

  permute:
    kind: tensor_method
    target: Tensor.permute
    stateful: false

  kv_seq_len:
    kind: adapter
    target: synapse.kv_seq_len
    stateful: false

profiles:
  gpt2:
    overrides:
      activation_default: gelu
      attention_op: attention
      projection_op: linear
