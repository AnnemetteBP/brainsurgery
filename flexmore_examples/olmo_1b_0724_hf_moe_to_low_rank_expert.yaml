inputs:
  - model::models/olmo_1b_0724_hf_dense_moe_demo

output:
  path: models/olmo_1b_0724_hf_low_rank_expert_r64_demo

transforms:
  # Literal companion to low_rank_expert.py:
  # rewrite expert 1 in place as a low-rank approximation relative to expert 0.
  #
  # For each expert-1 MLP matrix W1 and anchor expert-0 matrix W0:
  #   delta = W1 - W0
  #   delta <- phlora_(delta, rank=r)
  #   W1 <- W0 + delta
  #
  # The output remains a dense 2-expert MoE checkpoint, but expert 1 is now a
  # rank-r approximation around the dense anchor expert 0.

  - assert: { exists: model::model.layers\.0\.mlp\.experts\.0\.gate_proj\.weight }
  - assert: { exists: model::model.layers\.0\.mlp\.experts\.1\.gate_proj\.weight }
  - assert: { exists: model::model.layers\.0\.mlp\.experts\.0\.up_proj\.weight }
  - assert: { exists: model::model.layers\.0\.mlp\.experts\.1\.up_proj\.weight }
  - assert: { exists: model::model.layers\.0\.mlp\.experts\.0\.down_proj\.weight }
  - assert: { exists: model::model.layers\.0\.mlp\.experts\.1\.down_proj\.weight }

  - assert:
      shape:
        of: model::model.layers\.0\.mlp\.experts\.0\.gate_proj\.weight
        is: [8192, 2048]
  - assert:
      shape:
        of: model::model.layers\.0\.mlp\.experts\.0\.up_proj\.weight
        is: [8192, 2048]
  - assert:
      shape:
        of: model::model.layers\.0\.mlp\.experts\.0\.down_proj\.weight
        is: [2048, 8192]

  # Turn expert 1 into a delta against expert 0 in place.
  - subtract_:
      from: model::model.layers\.(\d+)\.mlp\.experts\.0\.gate_proj\.weight
      to: model::model.layers.\1.mlp.experts.1.gate_proj.weight
  - subtract_:
      from: model::model.layers\.(\d+)\.mlp\.experts\.0\.up_proj\.weight
      to: model::model.layers.\1.mlp.experts.1.up_proj.weight
  - subtract_:
      from: model::model.layers\.(\d+)\.mlp\.experts\.0\.down_proj\.weight
      to: model::model.layers.\1.mlp.experts.1.down_proj.weight

  # Replace those deltas with their rank-r PHLoRA reconstruction.
  - phlora_:
      target: model::model.layers\.(\d+)\.mlp\.experts\.1\.gate_proj\.weight
      rank: 64
  - phlora_:
      target: model::model.layers\.(\d+)\.mlp\.experts\.1\.up_proj\.weight
      rank: 64
  - phlora_:
      target: model::model.layers\.(\d+)\.mlp\.experts\.1\.down_proj\.weight
      rank: 64

  # Add the dense anchor back so expert 1 is again a full dense matrix.
  - add_:
      from: model::model.layers\.(\d+)\.mlp\.experts\.0\.gate_proj\.weight
      to: model::model.layers.\1.mlp.experts.1.gate_proj.weight
  - add_:
      from: model::model.layers\.(\d+)\.mlp\.experts\.0\.up_proj\.weight
      to: model::model.layers.\1.mlp.experts.1.up_proj.weight
  - add_:
      from: model::model.layers\.(\d+)\.mlp\.experts\.0\.down_proj\.weight
      to: model::model.layers.\1.mlp.experts.1.down_proj.weight

  # Final checks: both experts remain present, and the rewritten expert keeps
  # the original dense shapes.
  - assert:
      shape:
        of: model::model.layers\.0\.mlp\.experts\.1\.gate_proj\.weight
        is: [8192, 2048]
  - assert:
      shape:
        of: model::model.layers\.0\.mlp\.experts\.1\.up_proj\.weight
        is: [8192, 2048]
  - assert:
      shape:
        of: model::model.layers\.0\.mlp\.experts\.1\.down_proj\.weight
        is: [2048, 8192]
  - assert: { exists: model::model.layers\.15\.mlp\.experts\.0\.gate_proj\.weight }
  - assert: { exists: model::model.layers\.15\.mlp\.experts\.1\.gate_proj\.weight }
