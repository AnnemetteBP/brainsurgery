synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
    past_kv:
      optional: true
    use_cache:
      optional: true
  graph:
  - n_call_2:
      _op: call
      _target: Cache.past_length
      _args: past_kv
      _bind: kwarg_1
  - n_op_3:
      _op: position_ids
      _bind: pos_ids
      _args:
      - input_ids
      - attn_mask
      past_length: kwarg_1
  - n_op_4:
      _op: embedding
      _bind: x
      _args: input_ids
      dim: D
      _params:
        weight: model.embed_tokens.weight
  - n_op_5:
      _op: list_init
      _bind: new_kv
      when: use_cache
  - n_op_6:
      _op: _ir_const
      value: null
      _bind: new_kv
      when: not (use_cache)
  - n_for_10:
      _op: for
      _scope: model.layers
      _var: i
      _to: L
      _body:
      - n_op_7:
          _op: list_index
          _bind: past_i
          _args:
          - past_kv
          - i
      - n_call_8:
          _op: call
          _target: llama3_block
          _args:
          - x
          - pos_ids
          - attn_mask
          - past_i
          _bind:
          - x
          - new_i
      - n_op_9:
          _op: list_append
          _bind: new_kv
          _args:
          - new_kv
          - new_i
  - n_call_12:
      _op: rmsnorm
      _bind: pipe_11
      _args: x
      eps: EPS
      dim: D
      _params:
        weight: model.norm.weight
  - n_op_13:
      _op: linear
      _bind: logits
      _args: pipe_11
      dim: V
      _params:
        weight: model.embed_tokens.weight
  outputs:
    logits: logits
    new_kv: new_kv
  symbols:
    D: 2048
    V: 128256
    L: 16
    H: 32
    KVH: 8
    HD: 64
    KVD: 512
    FFN: 8192
    EPS: 1.0e-05
    THETA: 500000.0
    C: 131072
    ROPE_SCALE: 32.0
    ROPE_LOW_FREQ: 1.0
    ROPE_HIGH_FREQ: 4.0
    ROPE_CONTEXT: 8192
    B: null
    S: null
  blocks:
    Cache.past_length:
      inputs:
        cache:
          optional: true
      graph:
      - n_op_1:
          _op: list_index
          _bind: first
          _args:
          - cache
          - '0'
      - n_op_2:
          _op: cache_seq_len
          _bind: out_0
          _args: first
      outputs:
        out_0: out_0
    llama3_block:
      inputs:
        x:
          optional: false
        pos_ids:
          optional: false
        attn_mask:
          optional: true
        past_kv:
          optional: true
      graph:
      - n_call_1:
          _op: rmsnorm
          _bind: xn
          _args: x
          eps: EPS
          dim: D
          _params:
            weight: input_layernorm.weight
      - n_op_3:
          _op: linear
          _bind: pipe_2
          _args: xn
          dim: D
          _params:
            weight: self_attn.q_proj.weight
      - n_op_4:
          _op: reshape_heads
          _bind: q
          _args: pipe_2
          heads: H
      - n_op_6:
          _op: linear
          _bind: pipe_5
          _args: xn
          dim: KVD
          _params:
            weight: self_attn.k_proj.weight
      - n_op_7:
          _op: reshape_heads
          _bind: k
          _args: pipe_5
          heads: KVH
      - n_op_9:
          _op: linear
          _bind: pipe_8
          _args: xn
          dim: KVD
          _params:
            weight: self_attn.v_proj.weight
      - n_op_10:
          _op: reshape_heads
          _bind: v
          _args: pipe_8
          heads: KVH
      - n_op_11:
          _op: rope_pair
          _bind:
          - q
          - k
          _args:
          - q
          - k
          position_ids: pos_ids
          theta: THETA
          scale_factor: ROPE_SCALE
          low_freq_factor: ROPE_LOW_FREQ
          high_freq_factor: ROPE_HIGH_FREQ
          original_context: ROPE_CONTEXT
      - n_op_12:
          _op: cache_update
          _bind:
          - k
          - v
          - new_kv
          _args:
          - past_kv
          - k
          - v
      - n_op_13:
          _op: repeat
          _bind: k
          _args: k
          repeats: H / KVH
      - n_op_14:
          _op: repeat
          _bind: v
          _args: v
          repeats: H / KVH
      - n_op_15:
          _op: causal_mask
          _bind: mask
          _args:
          - q
          - k
          window: C
          padding_mask: attn_mask
      - n_op_17:
          _op: attention
          _bind: pipe_16
          _args:
          - q
          - k
          - v
          mask: mask
      - n_op_19:
          _op: merge_heads
          _bind: pipe_18
          _args: pipe_16
      - n_op_20:
          _op: linear
          _bind: a
          _args: pipe_18
          dim: D
          _params:
            weight: self_attn.o_proj.weight
      - n_op_21:
          _op: add
          _bind: x
          _args:
          - x
          - a
      - n_call_22:
          _op: rmsnorm
          _bind: xn
          _args: x
          eps: EPS
          dim: D
          _params:
            weight: post_attention_layernorm.weight
      - n_op_23:
          _op: linear
          _bind: g
          _args: xn
          dim: FFN
          _params:
            weight: mlp.gate_proj.weight
      - n_op_24:
          _op: linear
          _bind: u
          _args: xn
          dim: FFN
          _params:
            weight: mlp.up_proj.weight
      - n_op_26:
          _op: activations_silu
          _bind: pipe_25
          _args: g
      - n_op_28:
          _op: mul
          _bind: pipe_27
          _args:
          - pipe_25
          - u
      - n_op_29:
          _op: linear
          _bind: out_0
          _args: pipe_27
          dim: D
          _params:
            weight: mlp.down_proj.weight
      - n_op_30:
          _op: _ir_alias
          _args: out_0
          _bind: m
      - n_op_31:
          _op: add
          _bind: out_0
          _args:
          - x
          - m
      outputs:
        out_0: out_0
        new_kv: new_kv
