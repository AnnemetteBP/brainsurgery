synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
    past_key_values:
      optional: true
    use_cache:
      optional: true
  graph:
  - wte:
      op: embedding
      out: tok
      in: input_ids
      embedding_dim: D
  - n_op_1:
      op: arange_positions
      out: pos_ids
      in: input_ids
      attention_mask: attn_mask
  - wpe:
      op: embedding
      out: pos
      in: pos_ids
      embedding_dim: D
  - n_op_2:
      op: add
      out: x
      in:
      - tok
      - pos
  - n_op_3:
      op: init_list
      out: present_key_values
  - h:
      op: repeat
      var: i
      range: L
      body:
      - n_op_4:
          op: index
          out: past_i
          in:
          - past_key_values
          - i
      - n_use_5:
          use: gpt2_block
          in:
            x: x
            attn_mask: attn_mask
            past_kv: past_i
            use_cache: use_cache
          out:
            'y': x
            present_kv: present_i
      - n_op_6:
          op: append
          out: present_key_values
          in:
          - present_key_values
          - present_i
          when: use_cache
  - ln_f:
      op: layernorm
      out: pipe_7
      in: x
      dim: D
  - wte:
      op: linear
      out: logits
      in: pipe_7
  outputs:
    logits: logits
    present_key_values: present_key_values
  symbols:
    T: 1024
    D: 768
    L: 12
    H: 12
    V: 520257
    B: null
    S: null
  blocks:
    lin:
      inputs:
        x:
          optional: false
        dim:
          optional: false
        path:
          optional: false
      graph:
      - n_op_1:
          op: linear
          out: out_0
          in: x
          dim: dim
          bias: true
          transpose: true
          param_base: path
      outputs:
        out_0: out_0
    gpt2_block:
      inputs:
        x:
          optional: false
        attn_mask:
          optional: true
        past_kv:
          optional: true
        use_cache:
          optional: true
      graph:
      - ln_1:
          op: layernorm
          out: x1
          in: x
          dim: D
      - n_use_2:
          use: lin
          in:
            x: x1
            dim: 3*D
            path: '''attn.c_attn'''
          out:
            out_0: pipe_1
      - n_op_3:
          op: split_last
          out:
          - q_lin
          - k_lin
          - v_lin
          in: pipe_1
          parts: 3
      - n_op_4:
          op: reshape_heads
          out: q
          in: q_lin
          heads: H
      - n_op_5:
          op: reshape_heads
          out: k
          in: k_lin
          heads: H
      - n_op_6:
          op: reshape_heads
          out: v
          in: v_lin
          heads: H
      - n_op_7:
          op: kv_cache_update
          in:
          - past_kv
          - k
          - v
          out:
          - k_all
          - v_all
          - present_kv
      - n_op_8:
          op: coalesce
          in:
          - k_all
          - v_all
          - k
          - v
          out:
          - k_ctx
          - v_ctx
      - n_op_9:
          op: causal_mask
          out: causal_attn_mask
          in: q
          key: k_ctx
          window: T
          padding_mask: attn_mask
      - n_op_11:
          op: attention
          out: pipe_10
          in:
          - q
          - k_ctx
          - v_ctx
          backend: sdpa
          causal: true
          mask: causal_attn_mask
      - n_op_13:
          op: merge_heads
          out: pipe_12
          in: pipe_10
      - n_use_14:
          use: lin
          in:
            x: pipe_12
            dim: D
            path: '''attn.c_proj'''
          out:
            out_0: out_0
      - n_op_15:
          op: _ir_alias
          in: out_0
          out: a
      - n_op_16:
          op: add
          out: x
          in:
          - x
          - a
      - ln_2:
          op: layernorm
          out: x3
          in: x
          dim: D
      - n_use_18:
          use: lin
          in:
            x: x3
            dim: 4*D
            path: '''mlp.c_fc'''
          out:
            out_0: pipe_17
      - n_op_20:
          op: activation
          in: pipe_17
          out: pipe_19
          kind: gelu_new
      - n_use_21:
          use: lin
          in:
            x: pipe_19
            dim: D
            path: '''mlp.c_proj'''
          out:
            out_0: out_0
      - n_op_22:
          op: _ir_alias
          in: out_0
          out: m
      - n_op_23:
          op: add
          out: 'y'
          in:
          - x
          - m
      outputs:
        'y': 'y'
        present_kv: present_kv
