synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
    past_key_values:
      optional: true
    use_cache:
      optional: true
  graph:
  - n_op_1:
      _op: embedding
      _bind: tok
      _args: input_ids
      dim: D
      _params:
        weight: wte.weight
  - n_call_4:
      _op: call
      _target: Cache.past_length
      _args: past_key_values
      _bind: kwarg_3
  - n_op_5:
      _op: position_ids
      _bind: pipe_2
      _args:
      - input_ids
      - attn_mask
      past_length: kwarg_3
  - n_op_6:
      _op: embedding
      _bind: pos
      _args: pipe_2
      _params:
        weight: wpe.weight
  - n_op_7:
      _op: add
      _bind: x
      _args:
      - tok
      - pos
  - n_op_8:
      _op: list_init
      _bind: present_key_values
  - n_for_12:
      _op: for
      _scope: h
      _var: i
      _to: L
      _body:
      - n_op_9:
          _op: list_index
          _bind: past_i
          _args:
          - past_key_values
          - i
      - n_call_10:
          _op: call
          _target: gpt2_block
          _args:
          - x
          - attn_mask
          - past_i
          - use_cache
          _bind:
          - x
          - present_i
      - n_op_11:
          _op: list_append
          _bind: present_key_values
          _args:
          - present_key_values
          - present_i
          when: use_cache
  - n_op_14:
      _op: layernorm
      _bind: pipe_13
      _args: x
      dim: D
      _params:
        weight: ln_f.weight
        bias: ln_f.bias
  - n_op_15:
      _op: linear
      _bind: logits
      _args: pipe_13
      _params:
        weight: wte.weight
  outputs:
    logits: logits
    present_key_values: present_key_values
  symbols:
    T: 1024
    D: 768
    L: 12
    H: 12
    V: 520257
    B: null
    S: null
  blocks:
    Cache.past_length:
      inputs:
        cache:
          optional: true
      graph:
      - n_op_1:
          _op: list_index
          _bind: first
          _args:
          - cache
          - '0'
      - n_op_2:
          _op: cache_seq_len
          _bind: out_0
          _args: first
      outputs:
        out_0: out_0
    gpt2_block:
      inputs:
        x:
          optional: false
        attn_mask:
          optional: true
        past_kv:
          optional: true
        use_cache:
          optional: true
      graph:
      - n_op_1:
          _op: layernorm
          _bind: x1
          _args: x
          dim: D
          _params:
            weight: ln_1.weight
            bias: ln_1.bias
      - n_call_3:
          _op: linear
          _bind: pipe_2
          _args: x1
          dim: 3*D
          bias: true
          transpose: true
          _params:
            weight: attn.c_attn.weight
            bias: attn.c_attn.bias
      - n_op_4:
          _op: split
          _bind:
          - q_lin
          - k_lin
          - v_lin
          _args: pipe_2
          parts: 3
      - n_op_5:
          _op: reshape_heads
          _bind: q
          _args: q_lin
          heads: H
      - n_op_6:
          _op: reshape_heads
          _bind: k
          _args: k_lin
          heads: H
      - n_op_7:
          _op: reshape_heads
          _bind: v
          _args: v_lin
          heads: H
      - n_op_8:
          _op: cache_update
          _bind:
          - k_ctx
          - v_ctx
          - present_kv
          _args:
          - past_kv
          - k
          - v
          - use_cache
      - n_op_9:
          _op: causal_mask
          _bind: causal_attn_mask
          _args:
          - q
          - k_ctx
          window: T
          padding_mask: attn_mask
      - n_op_11:
          _op: attention
          _bind: pipe_10
          _args:
          - q
          - k_ctx
          - v_ctx
          mask: causal_attn_mask
          causal: true
      - n_op_13:
          _op: merge_heads
          _bind: pipe_12
          _args: pipe_10
      - n_call_14:
          _op: linear
          _bind: out_0
          _args: pipe_12
          dim: D
          bias: true
          transpose: true
          _params:
            weight: attn.c_proj.weight
            bias: attn.c_proj.bias
      - n_op_15:
          _op: _ir_alias
          _args: out_0
          _bind: a
      - n_op_16:
          _op: add
          _bind: x
          _args:
          - x
          - a
      - n_op_17:
          _op: layernorm
          _bind: x3
          _args: x
          dim: D
          _params:
            weight: ln_2.weight
            bias: ln_2.bias
      - n_call_19:
          _op: linear
          _bind: pipe_18
          _args: x3
          dim: 4*D
          bias: true
          transpose: true
          _params:
            weight: mlp.c_fc.weight
            bias: mlp.c_fc.bias
      - n_op_21:
          _op: activations_gelu_new
          _bind: pipe_20
          _args: pipe_18
      - n_call_22:
          _op: linear
          _bind: out_0
          _args: pipe_20
          dim: D
          bias: true
          transpose: true
          _params:
            weight: mlp.c_proj.weight
            bias: mlp.c_proj.bias
      - n_op_23:
          _op: _ir_alias
          _args: out_0
          _bind: m
      - n_op_24:
          _op: add
          _bind: 'y'
          _args:
          - x
          - m
      outputs:
        'y': 'y'
        present_kv: present_kv
