synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    past_key_values:
      optional: true
    use_cache:
      optional: true
  graph:
  - wte:
      op: embedding
      out: tok
      in: input_ids
      num_embeddings: 50257
      embedding_dim: 768
  - n_op_1:
      op: arange_positions
      out: pos_ids
      in: input_ids
      max_len: 1024
  - wpe:
      op: embedding
      out: pos
      in: pos_ids
      num_embeddings: 1024
      embedding_dim: 768
  - n_op_2:
      op: add
      out: x
      in:
      - tok
      - pos
  - n_op_3:
      op: init_list
      out: present_key_values
  - h:
      op: repeat
      var: i
      range: '12'
      body:
      - n_op_4:
          op: index
          out: past_i
          in:
          - past_key_values
          - i
      - n_use_5:
          use: gpt2_block
          in:
            x: x
            past_kv: past_i
            use_cache: use_cache
          out:
            'y': x
            present_kv: present_i
      - n_op_6:
          op: append
          out: present_key_values
          in:
          - present_key_values
          - present_i
          when: use_cache
  - ln_f:
      op: layernorm
      out: h_last
      in: x
      dim: 768
      eps: '1e-05'
  - n_op_7:
      op: linear
      out: logits
      in: h_last
      out_dim: 50257
      tie_weight: wte.weight
  outputs:
    logits: logits
    past_key_values: present_key_values
  blocks:
    gpt2_block:
      inputs:
        x:
          optional: false
        past_kv:
          optional: true
        use_cache:
          optional: true
      graph:
      - ln_1:
          op: layernorm
          out: x1
          in: x
          dim: 768
          eps: '1e-05'
      - attn:
          graph:
          - c_attn:
              op: linear
              out: qkv
              in: x1
              out_features: 2304
              weight_layout: io
              bias: true
      - n_op_1:
          op: split_last
          out:
          - q_lin
          - k_lin
          - v_lin
          in: qkv
          sizes: '[768, 768, 768]'
      - n_op_2:
          op: reshape_heads_triplet
          out:
          - q
          - k
          - v
          in:
          - q_lin
          - k_lin
          - v_lin
          heads: 12
          head_dim: 64
      - n_op_3:
          op: kv_cache_update
          in:
          - past_kv
          - k
          - v
          out:
          - k_all
          - v_all
          - present_kv
      - n_op_4:
          op: coalesce_triplet
          in:
          - k_all
          - v_all
          - k
          - v
          out:
          - k_ctx
          - v_ctx
      - n_op_5:
          op: attention
          out: ctx_heads
          in:
          - q
          - k_ctx
          - v_ctx
          backend: sdpa
          causal: true
          causal_mask_buffer: bias
      - n_op_6:
          op: merge_heads
          out: ctx
          in: ctx_heads
      - attn:
          graph:
          - c_proj:
              op: linear
              out: a
              in: ctx
              out_features: 768
              weight_layout: io
              bias: true
      - n_op_7:
          op: add
          out: x2
          in:
          - x
          - a
      - ln_2:
          op: layernorm
          out: x3
          in: x2
          dim: 768
          eps: '1e-05'
      - mlp:
          graph:
          - c_fc:
              op: linear
              out: m1
              in: x3
              out_features: 3072
              weight_layout: io
              bias: true
      - n_op_8:
          op: activation
          in: m1
          out: m2
          kind: gelu_new
      - mlp:
          graph:
          - c_proj:
              op: linear
              out: m3
              in: m2
              out_features: 768
              weight_layout: io
              bias: true
      - n_op_9:
          op: add
          out: 'y'
          in:
          - x2
          - m3
      outputs:
        'y': 'y'
        present_kv: present_kv
