synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
    past_key_values:
      optional: true
    use_cache:
      optional: true
  graph:
  - wte:
      _op: embedding
      _bind: tok
      _args: input_ids
      embedding_dim: D
  - n_op_2:
      _op: arange_positions
      _bind: pipe_1
      _args: input_ids
      attention_mask: attn_mask
  - wpe:
      _op: embedding
      _bind: pos
      _args: pipe_1
  - n_op_3:
      _op: add
      _bind: x
      _args:
      - tok
      - pos
  - n_op_4:
      _op: init_list
      _bind: present_key_values
  - h:
      _op: repeat
      var: i
      range: L
      body:
      - n_op_5:
          _op: index
          _bind: past_i
          _args:
          - past_key_values
          - i
      - n_call_6:
          _op: call
          _target: gpt2_block
          _args:
          - x
          - attn_mask
          - past_i
          - use_cache
          _bind:
          - x
          - present_i
      - n_op_7:
          _op: append
          _bind: present_key_values
          _args:
          - present_key_values
          - present_i
          when: use_cache
      - n_op_8:
          _op: _ir_alias
          _args: present_key_values
          _bind: present_key_values
          when: not (use_cache)
  - ln_f:
      _op: layernorm
      _bind: pipe_9
      _args: x
      dim: D
  - wte:
      _op: linear
      _bind: logits
      _args: pipe_9
  outputs:
    logits: logits
    present_key_values: present_key_values
  symbols:
    T: 1024
    D: 768
    L: 12
    H: 12
    V: 520257
    B: null
    S: null
  blocks:
    Cache.update:
      inputs:
        past:
          optional: true
        k:
          optional: false
        v:
          optional: false
      graph:
      - n_op_1:
          _op: kv_cache_update
          _args:
          - past
          - k
          - v
          _bind:
          - k_all
          - v_all
          - present
      outputs:
        k_all: k_all
        v_all: v_all
        present: present
    Cache.coalesce:
      inputs:
        k_all:
          optional: true
        v_all:
          optional: true
        k:
          optional: false
        v:
          optional: false
      graph:
      - n_op_1:
          _op: coalesce
          _args:
          - k_all
          - v_all
          - k
          - v
          _bind:
          - k_ctx
          - v_ctx
      outputs:
        k_ctx: k_ctx
        v_ctx: v_ctx
    lin:
      inputs:
        x:
          optional: false
        dim:
          optional: false
        path:
          optional: false
      graph:
      - n_op_1:
          _op: linear
          _bind: out_0
          _args: x
          dim: dim
          bias: true
          transpose: true
          param_base: path
      outputs:
        out_0: out_0
    gpt2_block:
      inputs:
        x:
          optional: false
        attn_mask:
          optional: true
        past_kv:
          optional: true
        use_cache:
          optional: true
      graph:
      - ln_1:
          _op: layernorm
          _bind: x1
          _args: x
          dim: D
      - n_call_2:
          _op: call
          _target: lin
          _args:
          - x1
          - 3*D
          _bind: pipe_1
          path: '''attn.c_attn'''
      - n_op_3:
          _op: split
          _bind:
          - q_lin
          - k_lin
          - v_lin
          _args: pipe_1
          parts: 3
      - n_op_4:
          _op: reshape_heads
          _bind: q
          _args: q_lin
          heads: H
      - n_op_5:
          _op: reshape_heads
          _bind: k
          _args: k_lin
          heads: H
      - n_op_6:
          _op: reshape_heads
          _bind: v
          _args: v_lin
          heads: H
      - n_call_7:
          _op: call
          _target: Cache.update
          _args:
          - past_kv
          - k
          - v
          _bind:
          - k_all
          - v_all
          - present_kv
          when: use_cache
      - n_call_8:
          _op: call
          _target: Cache.coalesce
          _args:
          - k_all
          - v_all
          - k
          - v
          _bind:
          - k_ctx
          - v_ctx
      - n_op_9:
          _op: causal_mask
          _bind: causal_attn_mask
          _args: q
          key: k_ctx
          window: T
          padding_mask: attn_mask
      - n_op_11:
          _op: attention
          _bind: pipe_10
          _args:
          - q
          - k_ctx
          - v_ctx
          backend: sdpa
          causal: true
          mask: causal_attn_mask
      - n_op_13:
          _op: merge_heads
          _bind: pipe_12
          _args: pipe_10
      - n_call_14:
          _op: call
          _target: lin
          _args:
          - pipe_12
          - D
          _bind: out_0
          path: '''attn.c_proj'''
      - n_op_15:
          _op: _ir_alias
          _args: out_0
          _bind: a
      - n_op_16:
          _op: add
          _bind: x
          _args:
          - x
          - a
      - ln_2:
          _op: layernorm
          _bind: x3
          _args: x
          dim: D
      - n_call_18:
          _op: call
          _target: lin
          _args:
          - x3
          - 4*D
          _bind: pipe_17
          path: '''mlp.c_fc'''
      - n_op_20:
          _op: activation
          _args: pipe_17
          _bind: pipe_19
          kind: gelu_new
      - n_call_21:
          _op: call
          _target: lin
          _args:
          - pipe_19
          - D
          _bind: out_0
          path: '''mlp.c_proj'''
      - n_op_22:
          _op: _ir_alias
          _args: out_0
          _bind: m
      - n_op_23:
          _op: add
          _bind: y
          _args:
          - x
          - m
      outputs:
        y: y
        present_kv: present_kv
