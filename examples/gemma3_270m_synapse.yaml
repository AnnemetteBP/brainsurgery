synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
    past_key_values:
      optional: true
    use_cache:
      optional: true
  graph:
  - n_call_2:
      _op: call
      _target: Cache.past_length
      _args: past_key_values
      _bind: kwarg_1
  - n_op_3:
      _op: position_ids
      _bind: pos_ids
      _args:
      - input_ids
      - attn_mask
      past_length: kwarg_1
  - n_op_4:
      _op: embedding
      _bind: x
      _args: input_ids
      dim: D
      scale: EMB_SCALE
      _params:
        weight: model.embed_tokens.weight
  - n_op_5:
      _op: init_list
      _bind: present_key_values
  - n_for_10:
      _op: for
      _scope: model.layers
      _var: i
      _to: L
      _body:
      - n_op_6:
          _op: index
          _bind: past_i
          _args:
          - past_key_values
          - i
      - n_call_7:
          _op: call
          _target: gemma3_block
          _args:
          - x
          - i
          - pos_ids
          - attn_mask
          - past_i
          - use_cache
          _bind:
          - x
          - present_i
      - n_op_8:
          _op: append
          _bind: present_key_values
          _args:
          - present_key_values
          - present_i
          when: use_cache
      - n_op_9:
          _op: _ir_alias
          _args: present_key_values
          _bind: present_key_values
          when: not (use_cache)
  - n_call_12:
      _op: rmsnorm
      _bind: pipe_11
      _args: x
      cast_float: true
      unit_offset: true
      dim: D
      _params:
        weight: model.norm.weight
  - n_op_13:
      _op: linear
      _bind: logits
      _args: pipe_11
      _params:
        weight: model.embed_tokens.weight
  outputs:
    logits: logits
    present_key_values: present_key_values
  symbols:
    D: 640
    V: 262208
    L: 18
    H: 4
    KVH: 1
    QD: 1024
    KVD: 256
    FFN: 2048
    ROPE_PERIOD: 6
    THETA_BASE: 10000.0
    THETA_LONG: 1000000.0
    WIN_LOCAL: 512
    WIN_LONG: 32768
    ATTN_SCALE: 0.0625
    EMB_SCALE: 25.298221281347036
    B: null
    S: null
  blocks:
    Cache.update:
      inputs:
        past:
          optional: true
        k:
          optional: false
        v:
          optional: false
      graph:
      - n_op_1:
          _op: kv_cache_update
          _args:
          - past
          - k
          - v
          _bind:
          - k_all
          - v_all
          - present
      outputs:
        k_all: k_all
        v_all: v_all
        present: present
    Cache.coalesce:
      inputs:
        k_all:
          optional: true
        v_all:
          optional: true
        k:
          optional: false
        v:
          optional: false
      graph:
      - n_op_1:
          _op: coalesce
          _args:
          - k_all
          - v_all
          - k
          - v
          _bind:
          - k_ctx
          - v_ctx
      outputs:
        k_ctx: k_ctx
        v_ctx: v_ctx
    Cache.past_length:
      inputs:
        cache:
          optional: true
      graph:
      - n_op_1:
          _op: index
          _bind: first
          _args:
          - cache
          - '0'
      - n_op_2:
          _op: kv_seq_len
          _args: first
          _bind: out_0
      outputs:
        out_0: out_0
    gemma3_block:
      inputs:
        x:
          optional: false
        i:
          optional: false
        pos_ids:
          optional: false
        attn_mask:
          optional: true
        past_kv:
          optional: true
        use_cache:
          optional: true
      graph:
      - n_call_1:
          _op: rmsnorm
          _bind: x_norm
          _args: x
          cast_float: true
          unit_offset: true
          dim: D
          _params:
            weight: input_layernorm.weight
      - n_op_3:
          _op: linear
          _bind: pipe_2
          _args: x_norm
          dim: QD
          _params:
            weight: self_attn.q_proj.weight
      - n_op_5:
          _op: reshape_heads
          _bind: pipe_4
          _args: pipe_2
          heads: H
      - n_call_6:
          _op: rmsnorm
          _bind: qn
          _args: pipe_4
          cast_float: true
          unit_offset: true
          dim: D
          _params:
            weight: self_attn.q_norm.weight
      - n_op_8:
          _op: linear
          _bind: pipe_7
          _args: x_norm
          dim: KVD
          _params:
            weight: self_attn.k_proj.weight
      - n_op_10:
          _op: reshape_heads
          _bind: pipe_9
          _args: pipe_7
          heads: KVH
      - n_call_11:
          _op: rmsnorm
          _bind: kn
          _args: pipe_9
          cast_float: true
          unit_offset: true
          dim: D
          _params:
            weight: self_attn.k_norm.weight
      - n_op_13:
          _op: linear
          _bind: pipe_12
          _args: x_norm
          dim: KVD
          _params:
            weight: self_attn.v_proj.weight
      - n_op_14:
          _op: reshape_heads
          _bind: v
          _args: pipe_12
          heads: KVH
      - n_op_15:
          _op: apply_rope_pair
          _bind:
          - qr
          - kr
          _args:
          - qn
          - kn
          position_ids: pos_ids
          theta: THETA_BASE + (THETA_LONG - THETA_BASE) * (((i + 1) % ROPE_PERIOD)
            == 0)
      - n_call_16:
          _op: call
          _target: Cache.update
          _args:
          - past_kv
          - kr
          - v
          _bind:
          - k_all
          - v_all
          - present_kv
          when: use_cache
      - n_call_17:
          _op: call
          _target: Cache.coalesce
          _args:
          - k_all
          - v_all
          - kr
          - v
          _bind:
          - k_ctx_raw
          - v_ctx_raw
      - n_op_18:
          _op: repeat_kv
          _bind: k_ctx
          _args: k_ctx_raw
          repeats: H / KVH
      - n_op_19:
          _op: repeat_kv
          _bind: v_ctx
          _args: v_ctx_raw
          repeats: H / KVH
      - n_op_20:
          _op: causal_mask
          _bind: mask
          _args:
          - qr
          - k_ctx
          window: WIN_LOCAL + (WIN_LONG - WIN_LOCAL) * (((i + 1) % ROPE_PERIOD) ==
            0)
          padding_mask: attn_mask
      - n_op_22:
          _op: attention
          _bind: pipe_21
          _args:
          - qr
          - k_ctx
          - v_ctx
          mask: mask
          backend: sdpa
          causal: true
          scale: ATTN_SCALE
          rope_theta: THETA_LONG
          sliding_window: WIN_LOCAL
      - n_op_24:
          _op: merge_heads
          _bind: pipe_23
          _args: pipe_21
      - n_op_25:
          _op: linear
          _bind: attn
          _args: pipe_23
          dim: D
          _params:
            weight: self_attn.o_proj.weight
      - n_call_26:
          _op: rmsnorm
          _bind: attn
          _args: attn
          cast_float: true
          unit_offset: true
          dim: D
          _params:
            weight: post_attention_layernorm.weight
      - n_op_27:
          _op: add
          _bind: x2
          _args:
          - x
          - attn
      - n_call_28:
          _op: rmsnorm
          _bind: x3
          _args: x2
          cast_float: true
          unit_offset: true
          dim: D
          _params:
            weight: pre_feedforward_layernorm.weight
      - n_op_29:
          _op: linear
          _bind: g
          _args: x3
          dim: FFN
          _params:
            weight: mlp.gate_proj.weight
      - n_op_30:
          _op: linear
          _bind: u
          _args: x3
          dim: FFN
          _params:
            weight: mlp.up_proj.weight
      - n_op_32:
          _op: activation
          _args: g
          _bind: pipe_31
          kind: gelu_pytorch_tanh
      - n_op_34:
          _op: mul
          _bind: pipe_33
          _args:
          - pipe_31
          - u
      - n_op_35:
          _op: linear
          _bind: out_0
          _args: pipe_33
          dim: D
          _params:
            weight: mlp.down_proj.weight
      - n_op_36:
          _op: _ir_alias
          _args: out_0
          _bind: m
      - n_call_37:
          _op: rmsnorm
          _bind: m
          _args: m
          cast_float: true
          unit_offset: true
          dim: D
          _params:
            weight: post_feedforward_layernorm.weight
      - n_op_38:
          _op: add
          _bind: 'y'
          _args:
          - x2
          - m
      outputs:
        'y': 'y'
        present_kv: present_kv
