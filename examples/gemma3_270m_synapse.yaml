synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
    past_kv:
      optional: true
    use_cache:
      optional: true
  graph:
  - n_call_2:
      _op: call
      _target: Cache.past_length
      _args: past_kv
      _bind: kwarg_1
  - n_op_3:
      _op: position_ids
      _bind: pos_ids
      _args:
      - input_ids
      - attn_mask
      past_length: kwarg_1
  - n_op_4:
      _op: embedding
      _bind: x
      _args: input_ids
      dim: D
      scale: EMB_SCALE
      _params:
        weight: model.embed_tokens.weight
  - n_op_5:
      _op: list_init
      _bind: new_kv
      when: use_cache
  - n_op_6:
      _op: _ir_const
      value: null
      _bind: new_kv
      when: not (use_cache)
  - n_for_10:
      _op: for
      _scope: model.layers
      _var: i
      _to: L
      _body:
      - n_op_7:
          _op: list_index
          _bind: past_i
          _args:
          - past_kv
          - i
      - n_call_8:
          _op: call
          _target: gemma3_block
          _args:
          - x
          - i
          - pos_ids
          - attn_mask
          - past_i
          _bind:
          - x
          - new_i
      - n_op_9:
          _op: list_append
          _bind: new_kv
          _args:
          - new_kv
          - new_i
  - n_call_12:
      _op: rmsnorm
      _bind: pipe_11
      _args: x
      cast_float: true
      unit_offset: true
      dim: D
      _params:
        weight: model.norm.weight
  - n_op_13:
      _op: linear
      _bind: logits
      _args: pipe_11
      _params:
        weight: model.embed_tokens.weight
  outputs:
    logits: logits
    new_kv: new_kv
  symbols:
    D: 640
    V: 262208
    L: 18
    H: 4
    KVH: 1
    QD: 1024
    KVD: 256
    FFN: 2048
    ROPE_PERIOD: 6
    THETA_BASE: 10000.0
    THETA_LONG: 1000000.0
    WIN_LOCAL: 512
    WIN_LONG: 32768
    ATTN_SCALE: 0.0625
    EMB_SCALE: 25.298221281347036
    B: null
    S: null
  blocks:
    Cache.past_length:
      inputs:
        cache:
          optional: true
      graph:
      - n_op_1:
          _op: list_index
          _bind: first
          _args:
          - cache
          - '0'
      - n_op_2:
          _op: cache_seq_len
          _bind: out_0
          _args: first
      outputs:
        out_0: out_0
    gemma3_block:
      inputs:
        x:
          optional: false
        i:
          optional: false
        pos_ids:
          optional: false
        attn_mask:
          optional: true
        past_kv:
          optional: true
      graph:
      - n_call_1:
          _op: rmsnorm
          _bind: x_norm
          _args: x
          cast_float: true
          unit_offset: true
          dim: D
          _params:
            weight: input_layernorm.weight
      - n_op_3:
          _op: linear
          _bind: pipe_2
          _args: x_norm
          dim: QD
          _params:
            weight: self_attn.q_proj.weight
      - n_op_5:
          _op: reshape_heads
          _bind: pipe_4
          _args: pipe_2
          heads: H
      - n_call_6:
          _op: rmsnorm
          _bind: q
          _args: pipe_4
          cast_float: true
          unit_offset: true
          dim: D
          _params:
            weight: self_attn.q_norm.weight
      - n_op_8:
          _op: linear
          _bind: pipe_7
          _args: x_norm
          dim: KVD
          _params:
            weight: self_attn.k_proj.weight
      - n_op_10:
          _op: reshape_heads
          _bind: pipe_9
          _args: pipe_7
          heads: KVH
      - n_call_11:
          _op: rmsnorm
          _bind: k
          _args: pipe_9
          cast_float: true
          unit_offset: true
          dim: D
          _params:
            weight: self_attn.k_norm.weight
      - n_op_13:
          _op: linear
          _bind: pipe_12
          _args: x_norm
          dim: KVD
          _params:
            weight: self_attn.v_proj.weight
      - n_op_14:
          _op: reshape_heads
          _bind: v
          _args: pipe_12
          heads: KVH
      - n_op_15:
          _op: apply_rope_pair
          _bind:
          - q
          - k
          _args:
          - q
          - k
          position_ids: pos_ids
          theta: THETA_BASE + (THETA_LONG - THETA_BASE) * (((i + 1) % ROPE_PERIOD)
            == 0)
      - n_op_16:
          _op: cache_update
          _bind:
          - k
          - v
          - new_kv
          _args:
          - past_kv
          - k
          - v
      - n_op_17:
          _op: repeat
          _bind: k
          _args: k
          repeats: H / KVH
      - n_op_18:
          _op: repeat
          _bind: v
          _args: v
          repeats: H / KVH
      - n_op_19:
          _op: causal_mask
          _bind: mask
          _args:
          - q
          - k
          window: WIN_LOCAL + (WIN_LONG - WIN_LOCAL) * (((i + 1) % ROPE_PERIOD) ==
            0)
          padding_mask: attn_mask
      - n_op_21:
          _op: attention
          _bind: pipe_20
          _args:
          - q
          - k
          - v
          mask: mask
          scale: ATTN_SCALE
      - n_op_23:
          _op: merge_heads
          _bind: pipe_22
          _args: pipe_20
      - n_op_24:
          _op: linear
          _bind: attn
          _args: pipe_22
          dim: D
          _params:
            weight: self_attn.o_proj.weight
      - n_call_25:
          _op: rmsnorm
          _bind: attn
          _args: attn
          cast_float: true
          unit_offset: true
          dim: D
          _params:
            weight: post_attention_layernorm.weight
      - n_op_26:
          _op: add
          _bind: x2
          _args:
          - x
          - attn
      - n_call_27:
          _op: rmsnorm
          _bind: x3
          _args: x2
          cast_float: true
          unit_offset: true
          dim: D
          _params:
            weight: pre_feedforward_layernorm.weight
      - n_op_28:
          _op: linear
          _bind: g
          _args: x3
          dim: FFN
          _params:
            weight: mlp.gate_proj.weight
      - n_op_29:
          _op: linear
          _bind: u
          _args: x3
          dim: FFN
          _params:
            weight: mlp.up_proj.weight
      - n_op_31:
          _op: activations_gelu_pytorch_tanh
          _bind: pipe_30
          _args: g
      - n_op_33:
          _op: mul
          _bind: pipe_32
          _args:
          - pipe_30
          - u
      - n_op_34:
          _op: linear
          _bind: out_0
          _args: pipe_32
          dim: D
          _params:
            weight: mlp.down_proj.weight
      - n_op_35:
          _op: _ir_alias
          _args: out_0
          _bind: m
      - n_call_36:
          _op: rmsnorm
          _bind: m
          _args: m
          cast_float: true
          unit_offset: true
          dim: D
          _params:
            weight: post_feedforward_layernorm.weight
      - n_op_37:
          _op: add
          _bind: 'y'
          _args:
          - x2
          - m
      outputs:
        'y': 'y'
        new_kv: new_kv
