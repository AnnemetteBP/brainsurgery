synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
    past_key_values:
      optional: true
    use_cache:
      optional: true
  graph:
  - n_op_1:
      op: arange_positions
      out: pos_ids
      in: input_ids
      attention_mask: attn_mask
  - model:
      graph:
      - embed_tokens:
          op: embedding
          out: x
          in: input_ids
          scale: EMB_SCALE
          embedding_dim: D
  - n_op_2:
      op: init_list
      out: present_key_values
  - model:
      graph:
      - layers:
          op: repeat
          var: i
          range: L
          body:
          - n_op_3:
              op: index
              out: past_i
              in:
              - past_key_values
              - i
          - n_use_4:
              use: gemma3_block
              in:
                x: x
                i: i
                pos_ids: pos_ids
                attn_mask: attn_mask
                past_kv: past_i
                use_cache: use_cache
              out:
                'y': x
                present_kv: present_i
          - n_op_5:
              op: append
              out: present_key_values
              in:
              - present_key_values
              - present_i
              when: use_cache
  - n_use_7:
      use: rms
      in:
        x: x
        path: '''model.norm'''
      out:
        out_0: pipe_6
  - model:
      graph:
      - embed_tokens:
          op: linear
          out: logits
          in: pipe_6
  outputs:
    logits: logits
    present_key_values: present_key_values
  symbols:
    D: 640
    V: 262208
    L: 18
    H: 4
    KVH: 1
    QD: 1024
    KVD: 256
    FFN: 2048
    ROPE_PERIOD: 6
    THETA_BASE: 10000.0
    THETA_LONG: 1000000.0
    WIN_LOCAL: 512
    WIN_LONG: 32768
    ATTN_SCALE: 0.0625
    EMB_SCALE: 25.298221281347036
    B: null
    S: null
  blocks:
    rms:
      inputs:
        x:
          optional: false
        path:
          optional: false
      graph:
      - n_op_1:
          op: rmsnorm
          out: out_0
          in: x
          cast_float: true
          unit_offset: true
          param_base: path
      outputs:
        out_0: out_0
    gemma3_block:
      inputs:
        x:
          optional: false
        i:
          optional: false
        pos_ids:
          optional: false
        attn_mask:
          optional: true
        past_kv:
          optional: true
        use_cache:
          optional: true
      graph:
      - n_use_1:
          use: rms
          in:
            x: x
            path: '''input_layernorm'''
          out:
            out_0: x_norm
      - self_attn:
          graph:
          - q_proj:
              op: linear
              out: pipe_2
              in: x_norm
              dim: QD
      - n_op_4:
          op: reshape_heads
          out: pipe_3
          in: pipe_2
          heads: H
      - n_use_5:
          use: rms
          in:
            x: pipe_3
            path: '''self_attn.q_norm'''
          out:
            out_0: qn
      - self_attn:
          graph:
          - k_proj:
              op: linear
              out: pipe_6
              in: x_norm
              dim: KVD
      - n_op_8:
          op: reshape_heads
          out: pipe_7
          in: pipe_6
          heads: KVH
      - n_use_9:
          use: rms
          in:
            x: pipe_7
            path: '''self_attn.k_norm'''
          out:
            out_0: kn
      - self_attn:
          graph:
          - v_proj:
              op: linear
              out: pipe_10
              in: x_norm
              dim: KVD
      - n_op_11:
          op: reshape_heads
          out: v
          in: pipe_10
          heads: KVH
      - n_op_12:
          op: apply_rope_pair
          out:
          - qr
          - kr
          in:
          - qn
          - kn
          position_ids: pos_ids
          theta: THETA_BASE + (THETA_LONG - THETA_BASE) * (((i + 1) % ROPE_PERIOD)
            == 0)
      - n_op_13:
          op: kv_cache_update
          in:
          - past_kv
          - kr
          - v
          out:
          - k_all
          - v_all
          - present_kv
      - n_op_14:
          op: coalesce
          in:
          - k_all
          - v_all
          - kr
          - v
          out:
          - k_ctx_raw
          - v_ctx_raw
      - n_op_15:
          op: repeat_kv
          out: k_ctx
          in: k_ctx_raw
          heads: H
          kv_heads: KVH
      - n_op_16:
          op: repeat_kv
          out: v_ctx
          in: v_ctx_raw
          heads: H
          kv_heads: KVH
      - n_op_17:
          op: causal_mask
          out: mask
          in: qr
          key: k_ctx
          window: WIN_LOCAL + (WIN_LONG - WIN_LOCAL) * (((i + 1) % ROPE_PERIOD) ==
            0)
          padding_mask: attn_mask
      - n_op_19:
          op: attention
          out: pipe_18
          in:
          - qr
          - k_ctx
          - v_ctx
          mask: mask
          backend: sdpa
          causal: true
          scale: ATTN_SCALE
          rope_theta: THETA_LONG
          sliding_window: WIN_LOCAL
      - n_op_21:
          op: merge_heads
          out: pipe_20
          in: pipe_18
      - self_attn:
          graph:
          - o_proj:
              op: linear
              out: attn
              in: pipe_20
              dim: D
      - n_use_22:
          use: rms
          in:
            x: attn
            path: '''post_attention_layernorm'''
          out:
            out_0: attn
      - n_op_23:
          op: add
          out: x2
          in:
          - x
          - attn
      - n_use_24:
          use: rms
          in:
            x: x2
            path: '''pre_feedforward_layernorm'''
          out:
            out_0: x3
      - mlp:
          graph:
          - gate_proj:
              op: linear
              out: g
              in: x3
              dim: FFN
      - mlp:
          graph:
          - up_proj:
              op: linear
              out: u
              in: x3
              dim: FFN
      - n_op_26:
          op: activation
          in: g
          out: pipe_25
          kind: gelu_pytorch_tanh
      - n_op_28:
          op: mul
          out: pipe_27
          in:
          - pipe_25
          - u
      - mlp:
          graph:
          - down_proj:
              op: linear
              out: out_0
              in: pipe_27
              dim: D
      - n_op_29:
          op: _ir_alias
          in: out_0
          out: m
      - n_use_30:
          use: rms
          in:
            x: m
            path: '''post_feedforward_layernorm'''
          out:
            out_0: m
      - n_op_31:
          op: add
          out: 'y'
          in:
          - x2
          - m
      outputs:
        'y': 'y'
        present_kv: present_kv
