synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
  graph:
  - embed_tokens:
      op: embedding
      out: x
      in: input_ids
      num_embeddings: V
      scale: 25.298221281347036
      embedding_dim: D
  - layers:
      op: repeat
      var: i
      range: L
      body:
      - n_use_1:
          use: gemma3_block
          in:
            x: x
            i: i
            attn_mask: attn_mask
          out:
            out_0: x
  - norm:
      op: rmsnorm
      out: pipe_2
      in: x
      cast_float: true
      unit_offset: true
      dim: D
  - n_op_3:
      op: linear
      out: logits
      in: pipe_2
      out_features: V
      tie_weight: embed_tokens.weight
  outputs:
    logits: logits
  symbols:
    D: 640
    V: null
    L: 18
    H: 4
    KVH: 1
    B: null
    S: null
  blocks:
    gemma3_block:
      inputs:
        x:
          optional: false
        i:
          optional: false
        attn_mask:
          optional: true
      graph:
      - input_layernorm:
          op: rmsnorm
          out: x_norm
          in: x
          cast_float: true
          unit_offset: true
          dim: D
      - self_attn:
          graph:
          - q_proj:
              op: linear
              out: q_lin
              in: x_norm
              out_features: 1024
      - self_attn:
          graph:
          - k_proj:
              op: linear
              out: k_lin
              in: x_norm
              out_features: 256
      - self_attn:
          graph:
          - v_proj:
              op: linear
              out: v_lin
              in: x_norm
              out_features: 256
      - n_op_1:
          op: reshape_heads
          out: q
          in: q_lin
          heads: H
      - n_op_2:
          op: reshape_heads
          out: k
          in: k_lin
          heads: KVH
      - n_op_3:
          op: reshape_heads
          out: v
          in: v_lin
          heads: KVH
      - self_attn:
          graph:
          - q_norm:
              op: rmsnorm
              out: qn
              in: q
              cast_float: true
              unit_offset: true
      - self_attn:
          graph:
          - k_norm:
              op: rmsnorm
              out: kn
              in: k
              cast_float: true
              unit_offset: true
      - n_op_4:
          op: apply_rope_pair
          out:
          - qr
          - kr
          in:
          - qn
          - kn
          theta: 10000.0 + (1000000.0 - 10000.0) * (((i + 1) % 6) == 0)
      - n_op_5:
          op: repeat_kv
          out: k_ctx
          in: kr
          heads: H
          kv_heads: KVH
      - n_op_6:
          op: repeat_kv
          out: v_ctx
          in: v
          heads: H
          kv_heads: KVH
      - n_op_7:
          op: causal_mask
          out: mask
          in: qr
          key: k_ctx
          window: 512 + (32768 - 512) * (((i + 1) % 6) == 0)
          padding_mask: attn_mask
      - n_op_9:
          op: attention
          out: pipe_8
          in:
          - qr
          - k_ctx
          - v_ctx
          mask: mask
          backend: sdpa
          causal: true
          scale: 0.0625
          rope_theta: 1000000.0
          sliding_window: 512
      - n_op_11:
          op: merge_heads
          out: pipe_10
          in: pipe_8
      - self_attn:
          graph:
          - o_proj:
              op: linear
              out: pipe_12
              in: pipe_10
              out_features: D
      - post_attention_layernorm:
          op: rmsnorm
          out: attn
          in: pipe_12
          cast_float: true
          unit_offset: true
          dim: D
      - n_op_13:
          op: add
          out: x2
          in:
          - x
          - attn
      - pre_feedforward_layernorm:
          op: rmsnorm
          out: x3
          in: x2
          cast_float: true
          unit_offset: true
          dim: D
      - mlp:
          graph:
          - gate_proj:
              op: linear
              out: g
              in: x3
              out_features: 2048
      - mlp:
          graph:
          - up_proj:
              op: linear
              out: u
              in: x3
              out_features: 2048
      - n_op_15:
          op: activation
          in: g
          out: pipe_14
          kind: gelu_pytorch_tanh
      - n_op_17:
          op: mul
          out: pipe_16
          in:
          - pipe_14
          - u
      - mlp:
          graph:
          - down_proj:
              op: linear
              out: pipe_18
              in: pipe_16
              out_features: D
      - post_feedforward_layernorm:
          op: rmsnorm
          out: m
          in: pipe_18
          cast_float: true
          unit_offset: true
          dim: D
      - n_op_19:
          op: add
          out: out_0
          in:
          - x2
          - m
      outputs:
        out_0: out_0
