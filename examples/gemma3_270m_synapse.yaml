synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
    past_key_values:
      optional: true
    use_cache:
      optional: true
  graph:
  - n_op_1:
      _op: arange_positions
      _bind: pos_ids
      _args: input_ids
      attention_mask: attn_mask
  - model:
      graph:
      - embed_tokens:
          _op: embedding
          _bind: x
          _args: input_ids
          scale: EMB_SCALE
          embedding_dim: D
  - n_op_2:
      _op: init_list
      _bind: present_key_values
  - model:
      graph:
      - layers:
          _op: repeat
          var: i
          range: L
          body:
          - n_op_3:
              _op: index
              _bind: past_i
              _args:
              - past_key_values
              - i
          - n_call_4:
              _op: call
              _target: gemma3_block
              _args:
              - x
              - i
              - pos_ids
              - attn_mask
              - past_i
              - use_cache
              _bind:
              - x
              - present_i
          - n_op_5:
              _op: append
              _bind: present_key_values
              _args:
              - present_key_values
              - present_i
              when: use_cache
          - n_op_6:
              _op: _ir_alias
              _args: present_key_values
              _bind: present_key_values
              when: not (use_cache)
  - n_call_8:
      _op: call
      _target: rms
      _args: x
      _bind: pipe_7
      path: '''model.norm'''
  - model:
      graph:
      - embed_tokens:
          _op: linear
          _bind: logits
          _args: pipe_7
  outputs:
    logits: logits
    present_key_values: present_key_values
  symbols:
    D: 640
    V: 262208
    L: 18
    H: 4
    KVH: 1
    QD: 1024
    KVD: 256
    FFN: 2048
    ROPE_PERIOD: 6
    THETA_BASE: 10000.0
    THETA_LONG: 1000000.0
    WIN_LOCAL: 512
    WIN_LONG: 32768
    ATTN_SCALE: 0.0625
    EMB_SCALE: 25.298221281347036
    B: null
    S: null
  blocks:
    Cache.update:
      inputs:
        past:
          optional: true
        k:
          optional: false
        v:
          optional: false
      graph:
      - n_op_1:
          _op: kv_cache_update
          _args:
          - past
          - k
          - v
          _bind:
          - k_all
          - v_all
          - present
      outputs:
        k_all: k_all
        v_all: v_all
        present: present
    Cache.coalesce:
      inputs:
        k_all:
          optional: true
        v_all:
          optional: true
        k:
          optional: false
        v:
          optional: false
      graph:
      - n_op_1:
          _op: coalesce
          _args:
          - k_all
          - v_all
          - k
          - v
          _bind:
          - k_ctx
          - v_ctx
      outputs:
        k_ctx: k_ctx
        v_ctx: v_ctx
    rms:
      inputs:
        x:
          optional: false
        path:
          optional: false
      graph:
      - n_op_1:
          _op: rmsnorm
          _bind: out_0
          _args: x
          cast_float: true
          unit_offset: true
          dim: D
          param_base: path
      outputs:
        out_0: out_0
    gemma3_block:
      inputs:
        x:
          optional: false
        i:
          optional: false
        pos_ids:
          optional: false
        attn_mask:
          optional: true
        past_kv:
          optional: true
        use_cache:
          optional: true
      graph:
      - n_call_1:
          _op: call
          _target: rms
          _args: x
          _bind: x_norm
          path: '''input_layernorm'''
      - self_attn:
          graph:
          - q_proj:
              _op: linear
              _bind: pipe_2
              _args: x_norm
              dim: QD
      - n_op_4:
          _op: reshape_heads
          _bind: pipe_3
          _args: pipe_2
          heads: H
      - n_call_5:
          _op: call
          _target: rms
          _args: pipe_3
          _bind: qn
          path: '''self_attn.q_norm'''
      - self_attn:
          graph:
          - k_proj:
              _op: linear
              _bind: pipe_6
              _args: x_norm
              dim: KVD
      - n_op_8:
          _op: reshape_heads
          _bind: pipe_7
          _args: pipe_6
          heads: KVH
      - n_call_9:
          _op: call
          _target: rms
          _args: pipe_7
          _bind: kn
          path: '''self_attn.k_norm'''
      - self_attn:
          graph:
          - v_proj:
              _op: linear
              _bind: pipe_10
              _args: x_norm
              dim: KVD
      - n_op_11:
          _op: reshape_heads
          _bind: v
          _args: pipe_10
          heads: KVH
      - n_op_12:
          _op: apply_rope_pair
          _bind:
          - qr
          - kr
          _args:
          - qn
          - kn
          position_ids: pos_ids
          theta: THETA_BASE + (THETA_LONG - THETA_BASE) * (((i + 1) % ROPE_PERIOD)
            == 0)
      - n_call_13:
          _op: call
          _target: Cache.update
          _args:
          - past_kv
          - kr
          - v
          _bind:
          - k_all
          - v_all
          - present_kv
          when: use_cache
      - n_call_14:
          _op: call
          _target: Cache.coalesce
          _args:
          - k_all
          - v_all
          - kr
          - v
          _bind:
          - k_ctx_raw
          - v_ctx_raw
      - n_op_15:
          _op: repeat_kv
          _bind: k_ctx
          _args: k_ctx_raw
          repeats: H / KVH
      - n_op_16:
          _op: repeat_kv
          _bind: v_ctx
          _args: v_ctx_raw
          repeats: H / KVH
      - n_op_17:
          _op: causal_mask
          _bind: mask
          _args: qr
          key: k_ctx
          window: WIN_LOCAL + (WIN_LONG - WIN_LOCAL) * (((i + 1) % ROPE_PERIOD) ==
            0)
          padding_mask: attn_mask
      - n_op_19:
          _op: attention
          _bind: pipe_18
          _args:
          - qr
          - k_ctx
          - v_ctx
          mask: mask
          backend: sdpa
          causal: true
          scale: ATTN_SCALE
          rope_theta: THETA_LONG
          sliding_window: WIN_LOCAL
      - n_op_21:
          _op: merge_heads
          _bind: pipe_20
          _args: pipe_18
      - self_attn:
          graph:
          - o_proj:
              _op: linear
              _bind: attn
              _args: pipe_20
              dim: D
      - n_call_22:
          _op: call
          _target: rms
          _args: attn
          _bind: attn
          path: '''post_attention_layernorm'''
      - n_op_23:
          _op: add
          _bind: x2
          _args:
          - x
          - attn
      - n_call_24:
          _op: call
          _target: rms
          _args: x2
          _bind: x3
          path: '''pre_feedforward_layernorm'''
      - mlp:
          graph:
          - gate_proj:
              _op: linear
              _bind: g
              _args: x3
              dim: FFN
      - mlp:
          graph:
          - up_proj:
              _op: linear
              _bind: u
              _args: x3
              dim: FFN
      - n_op_26:
          _op: activation
          _args: g
          _bind: pipe_25
          kind: gelu_pytorch_tanh
      - n_op_28:
          _op: mul
          _bind: pipe_27
          _args:
          - pipe_25
          - u
      - mlp:
          graph:
          - down_proj:
              _op: linear
              _bind: out_0
              _args: pipe_27
              dim: D
      - n_op_29:
          _op: _ir_alias
          _args: out_0
          _bind: m
      - n_call_30:
          _op: call
          _target: rms
          _args: m
          _bind: m
          path: '''post_feedforward_layernorm'''
      - n_op_31:
          _op: add
          _bind: y
          _args:
          - x2
          - m
      outputs:
        y: y
        present_kv: present_kv
