synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
  graph:
  - n_op_1:
      _op: embedding
      _bind: tok
      _args: input_ids
      dim: D
      _params:
        weight: wte.weight
  - n_op_3:
      _op: position_ids
      _bind: pipe_2
      _args:
      - input_ids
      - attn_mask
  - n_op_4:
      _op: embedding
      _bind: pos
      _args: pipe_2
      _params:
        weight: wpe.weight
  - n_op_5:
      _op: add
      _bind: x
      _args:
      - tok
      - pos
  - n_for_7:
      _op: for
      _scope: h
      _var: i
      _to: L
      _body:
      - n_call_6:
          _op: call
          _target: gpt2_block
          _args:
          - x
          - attn_mask
          _bind: x
  - n_op_9:
      _op: layernorm
      _bind: pipe_8
      _args: x
      dim: D
      _params:
        weight: ln_f.weight
        bias: ln_f.bias
  - n_op_10:
      _op: linear
      _bind: logits
      _args: pipe_8
      dim: V
      _params:
        weight: wte.weight
  outputs:
    logits: logits
  symbols:
    T: 1024
    D: 768
    L: 12
    H: 12
    V: null
    B: null
    S: null
  blocks:
    gpt2_block:
      inputs:
        x:
          optional: false
        attn_mask:
          optional: true
      graph:
      - n_op_1:
          _op: layernorm
          _bind: x1
          _args: x
          dim: D
          _params:
            weight: ln_1.weight
            bias: ln_1.bias
      - n_call_3:
          _op: linear
          _bind: pipe_2
          _args: x1
          dim: 3*D
          bias: true
          transpose: true
          _params:
            weight: attn.c_attn.weight
            bias: attn.c_attn.bias
      - n_op_4:
          _op: split
          _bind:
          - q_lin
          - k_lin
          - v_lin
          _args: pipe_2
          parts: 3
      - n_op_5:
          _op: reshape_heads
          _bind: q
          _args: q_lin
          heads: H
      - n_op_6:
          _op: reshape_heads
          _bind: k
          _args: k_lin
          heads: H
      - n_op_7:
          _op: reshape_heads
          _bind: v
          _args: v_lin
          heads: H
      - n_op_8:
          _op: causal_mask
          _bind: causal_attn_mask
          _args:
          - q
          - k
          window: 768
          padding_mask: attn_mask
      - n_op_10:
          _op: attention
          _bind: pipe_9
          _args:
          - q
          - k
          - v
          mask: causal_attn_mask
          causal: true
      - n_op_12:
          _op: merge_heads
          _bind: pipe_11
          _args: pipe_9
      - n_call_13:
          _op: linear
          _bind: out_0
          _args: pipe_11
          dim: D
          bias: true
          transpose: true
          _params:
            weight: attn.c_proj.weight
            bias: attn.c_proj.bias
      - n_op_14:
          _op: _ir_alias
          _args: out_0
          _bind: a
      - n_op_15:
          _op: add
          _bind: x
          _args:
          - x
          - a
      - n_op_16:
          _op: layernorm
          _bind: x3
          _args: x
          dim: D
          _params:
            weight: ln_2.weight
            bias: ln_2.bias
      - n_call_18:
          _op: linear
          _bind: pipe_17
          _args: x3
          dim: 4*D
          bias: true
          transpose: true
          _params:
            weight: mlp.c_fc.weight
            bias: mlp.c_fc.bias
      - n_op_20:
          _op: activations_gelu_new
          _args: pipe_17
          _bind: pipe_19
      - n_call_21:
          _op: linear
          _bind: out_0
          _args: pipe_19
          dim: D
          bias: true
          transpose: true
          _params:
            weight: mlp.c_proj.weight
            bias: mlp.c_proj.bias
      - n_op_22:
          _op: _ir_alias
          _args: out_0
          _bind: m
      - n_op_23:
          _op: add
          _bind: out_0
          _args:
          - x
          - m
      outputs:
        out_0: out_0
