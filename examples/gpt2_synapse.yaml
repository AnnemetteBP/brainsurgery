synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
  graph:
  - wte:
      op: embedding
      out: tok
      in: input_ids
      embedding_dim: D
  - n_op_2:
      op: arange_positions
      out: pipe_1
      in: input_ids
      attention_mask: attn_mask
  - wpe:
      op: embedding
      out: pos
      in: pipe_1
      embedding_dim: D
  - n_op_3:
      op: add
      out: x
      in:
      - tok
      - pos
  - h:
      op: repeat
      var: i
      range: L
      body:
      - n_use_4:
          use: gpt2_block
          in:
            x: x
            attn_mask: attn_mask
          out:
            out_0: x
  - ln_f:
      op: layernorm
      out: pipe_5
      in: x
      dim: D
  - wte:
      op: linear
      out: logits
      in: pipe_5
      dim: V
  outputs:
    logits: logits
  symbols:
    T: 1024
    D: 768
    L: 12
    H: 12
    V: null
    B: null
    S: null
  blocks:
    lin:
      inputs:
        x:
          optional: false
        dim:
          optional: false
        path:
          optional: false
      graph:
      - n_op_1:
          op: linear
          out: out_0
          in: x
          dim: dim
          bias: true
          transpose: true
          param_base: path
      outputs:
        out_0: out_0
    gpt2_block:
      inputs:
        x:
          optional: false
        attn_mask:
          optional: true
      graph:
      - ln_1:
          op: layernorm
          out: x1
          in: x
          dim: D
      - n_use_2:
          use: lin
          in:
            x: x1
            dim: 3*D
            path: '''attn.c_attn'''
          out:
            out_0: pipe_1
      - n_op_3:
          op: split
          out:
          - q_lin
          - k_lin
          - v_lin
          in: pipe_1
          parts: 3
      - n_op_4:
          op: reshape_heads
          out: q
          in: q_lin
          heads: H
      - n_op_5:
          op: reshape_heads
          out: k
          in: k_lin
          heads: H
      - n_op_6:
          op: reshape_heads
          out: v
          in: v_lin
          heads: H
      - n_op_7:
          op: causal_mask
          out: causal_attn_mask
          in: q
          key: k
          window: T
          padding_mask: attn_mask
      - n_op_9:
          op: attention
          out: pipe_8
          in:
          - q
          - k
          - v
          backend: sdpa
          causal: true
          mask: causal_attn_mask
      - n_op_11:
          op: merge_heads
          out: pipe_10
          in: pipe_8
      - n_use_12:
          use: lin
          in:
            x: pipe_10
            dim: D
            path: '''attn.c_proj'''
          out:
            out_0: out_0
      - n_op_13:
          op: _ir_alias
          in: out_0
          out: a
      - n_op_14:
          op: add
          out: x
          in:
          - x
          - a
      - ln_2:
          op: layernorm
          out: x3
          in: x
          dim: D
      - n_use_16:
          use: lin
          in:
            x: x3
            dim: 4*D
            path: '''mlp.c_fc'''
          out:
            out_0: pipe_15
      - n_op_18:
          op: activation
          in: pipe_15
          out: pipe_17
          kind: gelu_new
      - n_use_19:
          use: lin
          in:
            x: pipe_17
            dim: D
            path: '''mlp.c_proj'''
          out:
            out_0: out_0
      - n_op_20:
          op: _ir_alias
          in: out_0
          out: m
      - n_op_21:
          op: add
          out: out_0
          in:
          - x
          - m
      outputs:
        out_0: out_0
