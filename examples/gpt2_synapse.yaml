synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
  graph:
  - wte:
      op: embedding
      out: tok
      in: input_ids
      embedding_dim: D
  - n_op_2:
      op: arange_positions
      out: pipe_1
      in: input_ids
      attention_mask: attn_mask
  - wpe:
      op: embedding
      out: pos
      in: pipe_1
      embedding_dim: D
  - n_op_3:
      op: add
      out: x
      in:
      - tok
      - pos
  - h:
      op: repeat
      var: i
      range: (L-1) + 1
      body:
      - n_use_4:
          use: gpt2_block
          in:
            x: x
            attn_mask: attn_mask
          out:
            out_0: x
  - ln_f:
      op: layernorm
      out: pipe_5
      in: x
      dim: D
  - n_op_6:
      op: linear
      out: logits
      in: pipe_5
      tie_weight: wte.weight
      out_features: V
  outputs:
    logits: logits
  symbols:
    T: 1024
    D: 768
    L: 12
    H: 12
    V: null
    B: null
    S: null
  blocks:
    gpt2_block:
      inputs:
        x:
          optional: false
        attn_mask:
          optional: true
      graph:
      - ln_1:
          op: layernorm
          out: pipe_1
          in: x
          dim: D
      - attn:
          graph:
          - c_attn:
              op: linear
              out: pipe_2
              in: pipe_1
              out_features: 3*D
              bias: true
              weight_layout: io
      - n_op_6:
          op: split_last
          out:
          - pipe_3
          - pipe_4
          - pipe_5
          in: pipe_2
          parts: 3
      - n_op_7:
          op: reshape_heads_triplet
          out:
          - q
          - k
          - v
          in:
          - pipe_3
          - pipe_4
          - pipe_5
          heads: H
      - n_op_8:
          op: causal_mask
          out: causal_attn_mask
          in: q
          key: k
          window: T
          padding_mask: attn_mask
      - n_op_10:
          op: attention
          out: pipe_9
          in:
          - q
          - k
          - v
          backend: sdpa
          causal: true
          mask: causal_attn_mask
      - n_op_12:
          op: merge_heads
          out: pipe_11
          in: pipe_9
      - attn:
          graph:
          - c_proj:
              op: linear
              out: a
              in: pipe_11
              out_features: D
              bias: true
              weight_layout: io
      - n_op_13:
          op: add
          out: x
          in:
          - x
          - a
      - ln_2:
          op: layernorm
          out: pipe_14
          in: x
          dim: D
      - mlp:
          graph:
          - c_fc:
              op: linear
              out: pipe_15
              in: pipe_14
              out_features: 4*D
              bias: true
              weight_layout: io
      - n_op_17:
          op: activation
          in: pipe_15
          out: pipe_16
          kind: gelu_new
      - mlp:
          graph:
          - c_proj:
              op: linear
              out: m
              in: pipe_16
              out_features: D
              bias: true
              weight_layout: io
      - n_op_18:
          op: add
          out: out_0
          in:
          - x
          - m
      outputs:
        out_0: out_0
