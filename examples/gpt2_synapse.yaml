synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
  graph:
  - wte:
      _op: embedding
      _bind: tok
      _args: input_ids
      embedding_dim: D
  - n_op_2:
      _op: arange_positions
      _bind: pipe_1
      _args: input_ids
      attention_mask: attn_mask
  - wpe:
      _op: embedding
      _bind: pos
      _args: pipe_1
  - n_op_3:
      _op: add
      _bind: x
      _args:
      - tok
      - pos
  - h:
      _op: repeat
      var: i
      range: L
      body:
      - n_call_4:
          _op: call
          _target: gpt2_block
          _args:
          - x
          - attn_mask
          _bind: x
  - ln_f:
      _op: layernorm
      _bind: pipe_5
      _args: x
      dim: D
  - wte:
      _op: linear
      _bind: logits
      _args: pipe_5
      dim: V
  outputs:
    logits: logits
  symbols:
    T: 1024
    D: 768
    L: 12
    H: 12
    V: null
    B: null
    S: null
  blocks:
    lin:
      inputs:
        x:
          optional: false
        dim:
          optional: false
        path:
          optional: false
      graph:
      - n_op_1:
          _op: linear
          _bind: out_0
          _args: x
          dim: dim
          bias: true
          transpose: true
          param_base: path
      outputs:
        out_0: out_0
    gpt2_block:
      inputs:
        x:
          optional: false
        attn_mask:
          optional: true
      graph:
      - ln_1:
          _op: layernorm
          _bind: x1
          _args: x
          dim: D
      - n_call_2:
          _op: call
          _target: lin
          _args:
          - x1
          - 3*D
          _bind: pipe_1
          path: '''attn.c_attn'''
      - n_op_3:
          _op: split
          _bind:
          - q_lin
          - k_lin
          - v_lin
          _args: pipe_1
          parts: 3
      - n_op_4:
          _op: reshape_heads
          _bind: q
          _args: q_lin
          heads: H
      - n_op_5:
          _op: reshape_heads
          _bind: k
          _args: k_lin
          heads: H
      - n_op_6:
          _op: reshape_heads
          _bind: v
          _args: v_lin
          heads: H
      - n_op_7:
          _op: causal_mask
          _bind: causal_attn_mask
          _args: q
          key: k
          window: T
          padding_mask: attn_mask
      - n_op_9:
          _op: attention
          _bind: pipe_8
          _args:
          - q
          - k
          - v
          backend: sdpa
          causal: true
          mask: causal_attn_mask
      - n_op_11:
          _op: merge_heads
          _bind: pipe_10
          _args: pipe_8
      - n_call_12:
          _op: call
          _target: lin
          _args:
          - pipe_10
          - D
          _bind: out_0
          path: '''attn.c_proj'''
      - n_op_13:
          _op: _ir_alias
          _args: out_0
          _bind: a
      - n_op_14:
          _op: add
          _bind: x
          _args:
          - x
          - a
      - ln_2:
          _op: layernorm
          _bind: x3
          _args: x
          dim: D
      - n_call_16:
          _op: call
          _target: lin
          _args:
          - x3
          - 4*D
          _bind: pipe_15
          path: '''mlp.c_fc'''
      - n_op_18:
          _op: activation
          _args: pipe_15
          _bind: pipe_17
          kind: gelu_new
      - n_call_19:
          _op: call
          _target: lin
          _args:
          - pipe_17
          - D
          _bind: out_0
          path: '''mlp.c_proj'''
      - n_op_20:
          _op: _ir_alias
          _args: out_0
          _bind: m
      - n_op_21:
          _op: add
          _bind: out_0
          _args:
          - x
          - m
      outputs:
        out_0: out_0
