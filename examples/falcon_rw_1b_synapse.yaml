synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: false
    past_kv:
      optional: true
    use_cache:
      optional: true
  graph:
  - n_op_1:
      _op: embedding
      _bind: x
      _args: input_ids
      dim: D
      _params:
        weight: transformer.word_embeddings.weight
  - n_op_2:
      _op: list_init
      _bind: new_kv
      when: use_cache
  - n_op_3:
      _op: _ir_const
      value: null
      _bind: new_kv
      when: not (use_cache)
  - n_for_7:
      _op: for
      _scope: transformer.h
      _var: i
      _to: L
      _body:
      - n_op_4:
          _op: list_index
          _bind: past_i
          _args:
          - past_kv
          - i
      - n_call_5:
          _op: call
          _target: falcon_block
          _args:
          - x
          - attn_mask
          - past_i
          _bind:
          - x
          - new_i
      - n_op_6:
          _op: list_append
          _bind: new_kv
          _args:
          - new_kv
          - new_i
  - n_op_9:
      _op: layernorm
      _bind: pipe_8
      _args: x
      dim: D
      _params:
        weight: transformer.ln_f.weight
        bias: transformer.ln_f.bias
  - n_op_10:
      _op: linear
      _bind: logits
      _args: pipe_8
      dim: V
      _params:
        weight: lm_head.weight
  outputs:
    logits: logits
    new_kv: new_kv
  symbols:
    D: 2048
    V: 50304
    L: 24
    H: 32
    FFN: 8192
    C: 2048
    B: null
    S: null
  blocks:
    falcon_block:
      inputs:
        x:
          optional: false
        attn_mask:
          optional: false
        past_kv:
          optional: true
      graph:
      - n_op_1:
          _op: layernorm
          _bind: xn
          _args: x
          dim: D
          _params:
            weight: input_layernorm.weight
            bias: input_layernorm.bias
      - n_op_2:
          _op: linear
          _bind: qkv
          _args: xn
          dim: (3 * D)
          bias: true
          _params:
            weight: self_attention.query_key_value.weight
            bias: self_attention.query_key_value.bias
      - n_op_3:
          _op: split
          _bind:
          - q_lin
          - k_lin
          - v_lin
          _args: qkv
          parts: 3
      - n_op_4:
          _op: reshape_heads
          _bind: q
          _args: q_lin
          heads: H
      - n_op_5:
          _op: reshape_heads
          _bind: k
          _args: k_lin
          heads: H
      - n_op_6:
          _op: reshape_heads
          _bind: v
          _args: v_lin
          heads: H
      - n_op_7:
          _op: cache_update
          _bind:
          - k
          - v
          - new_kv
          _args:
          - past_kv
          - k
          - v
      - n_op_8:
          _op: causal_mask
          _bind: causal
          _args:
          - q
          - k
          window: C
          padding_mask: attn_mask
      - n_op_9:
          _op: linear_position_bias
          _bind: pos_bias
          _args: attn_mask
          heads: H
      - n_op_10:
          _op: _ir_const
          value: causal + pos_bias
          _bind: mask
      - n_op_12:
          _op: attention
          _bind: pipe_11
          _args:
          - q
          - k
          - v
          mask: mask
      - n_op_13:
          _op: merge_heads
          _bind: a
          _args: pipe_11
      - n_op_14:
          _op: linear
          _bind: a
          _args: a
          dim: D
          bias: true
          _params:
            weight: self_attention.dense.weight
            bias: self_attention.dense.bias
      - n_op_15:
          _op: add
          _bind: x
          _args:
          - x
          - a
      - n_op_16:
          _op: layernorm
          _bind: x_mlp
          _args: x
          dim: D
          _params:
            weight: mlp.post_attention_layernorm.weight
            bias: mlp.post_attention_layernorm.bias
      - n_op_17:
          _op: linear
          _bind: h
          _args: x_mlp
          dim: FFN
          bias: true
          _params:
            weight: mlp.dense_h_to_4h.weight
            bias: mlp.dense_h_to_4h.bias
      - n_op_19:
          _op: activations_gelu
          _bind: pipe_18
          _args: h
      - n_op_20:
          _op: linear
          _bind: out_0
          _args: pipe_18
          dim: D
          bias: true
          _params:
            weight: mlp.dense_4h_to_h.weight
            bias: mlp.dense_4h_to_h.bias
      - n_op_21:
          _op: _ir_alias
          _args: out_0
          _bind: m
      - n_op_22:
          _op: add
          _bind: x
          _args:
          - x
          - m
      outputs:
        x: x
        new_kv: new_kv
