synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
    past_key_values:
      optional: true
    use_cache:
      optional: true
  graph:
  - n_op_1:
      op: arange_positions
      out: pos_ids
      in: input_ids
      attention_mask: attn_mask
  - model:
      graph:
      - embed_tokens:
          op: embedding
          out: x
          in: input_ids
          embedding_dim: D
  - n_op_2:
      op: init_list
      out: present_key_values
  - model:
      graph:
      - layers:
          op: repeat
          var: i
          range: L
          body:
          - n_op_3:
              op: index
              out: past_i
              in:
              - past_key_values
              - i
          - n_use_4:
              use: olmoe_decoder_block
              in:
                x: x
                pos_ids: pos_ids
                attn_mask: attn_mask
                past_kv: past_i
                use_cache: use_cache
              out:
                out_0: x
                present_kv: present_i
          - n_op_5:
              op: append
              out: present_key_values
              in:
              - present_key_values
              - present_i
              when: use_cache
  - n_use_6:
      use: rms
      in:
        x: x
        path: '''model.norm'''
      out:
        out_0: x
  - lm_head:
      op: linear
      out: logits
      in: x
  outputs:
    logits: logits
    present_key_values: present_key_values
  symbols:
    D: 2048
    V: 50304
    L: 16
    H: 16
    HD: 128
    E: 64
    EPT: 8
    C: 4096
    EPS: 1.0e-05
    THETA: 10000.0
    ATTN_SCALE: 0.08838834764831845
    B: null
    S: null
  blocks:
    rms:
      inputs:
        x:
          optional: false
        path:
          optional: false
      graph:
      - n_op_1:
          op: rmsnorm
          out: out_0
          in: x
          eps: EPS
          param_base: path
      outputs:
        out_0: out_0
    expert_ffn:
      inputs:
        x:
          optional: false
      graph:
      - gate_proj:
          op: linear
          out: gate
          in: x
      - up_proj:
          op: linear
          out: up
          in: x
      - n_op_2:
          op: activation
          in: gate
          out: pipe_1
          kind: silu
      - n_op_4:
          op: mul
          out: pipe_3
          in:
          - pipe_1
          - up
      - down_proj:
          op: linear
          out: out_0
          in: pipe_3
      outputs:
        out_0: out_0
    olmoe_decoder_block:
      inputs:
        x:
          optional: false
        pos_ids:
          optional: false
        attn_mask:
          optional: true
        past_kv:
          optional: true
        use_cache:
          optional: true
      graph:
      - n_use_1:
          use: rms
          in:
            x: x
            path: '''input_layernorm'''
          out:
            out_0: x_norm
      - self_attn:
          graph:
          - q_proj:
              op: linear
              out: pipe_2
              in: x_norm
              dim: D
      - n_use_4:
          use: rms
          in:
            x: pipe_2
            path: '''self_attn.q_norm'''
          out:
            out_0: pipe_3
      - n_op_5:
          op: reshape_heads
          out: q
          in: pipe_3
          heads: H
      - self_attn:
          graph:
          - k_proj:
              op: linear
              out: pipe_6
              in: x_norm
              dim: D
      - n_use_8:
          use: rms
          in:
            x: pipe_6
            path: '''self_attn.k_norm'''
          out:
            out_0: pipe_7
      - n_op_9:
          op: reshape_heads
          out: k
          in: pipe_7
          heads: H
      - self_attn:
          graph:
          - v_proj:
              op: linear
              out: pipe_10
              in: x_norm
              dim: D
      - n_op_11:
          op: reshape_heads
          out: v
          in: pipe_10
          heads: H
      - n_op_12:
          op: apply_rope_pair
          out:
          - qr
          - kr
          in:
          - q
          - k
          position_ids: pos_ids
          theta: THETA
      - n_op_13:
          op: kv_cache_update
          in:
          - past_kv
          - kr
          - v
          out:
          - k_all
          - v_all
          - present_kv
      - n_op_14:
          op: coalesce
          in:
          - k_all
          - v_all
          - kr
          - v
          out:
          - k_coalesced
          - v_coalesced
      - n_op_15:
          op: causal_mask
          out: mask
          in: qr
          key: k_coalesced
          window: C
          padding_mask: attn_mask
      - n_op_17:
          op: attention
          out: pipe_16
          in:
          - qr
          - k_coalesced
          - v_coalesced
          mask: mask
          causal: true
          scale: ATTN_SCALE
      - n_op_18:
          op: merge_heads
          out: a
          in: pipe_16
      - self_attn:
          graph:
          - o_proj:
              op: linear
              out: a
              in: a
              dim: D
      - n_op_19:
          op: add
          out: x
          in:
          - x
          - a
      - n_use_20:
          use: rms
          in:
            x: x
            path: '''post_attention_layernorm'''
          out:
            out_0: x3
      - mlp:
          graph:
          - gate:
              op: linear
              out: pipe_21
              in: x3
              dim: E
      - n_op_23:
          op: softmax
          out: pipe_22
          in: pipe_21
          dim: -1
          dtype: float32
      - n_op_24:
          op: topk
          out:
          - topk_scores
          - topk_indices
          in: pipe_22
          k: EPT
          dim: -1
      - n_op_25:
          op: zeros_like
          out: m
          in: x3
      - mlp:
          graph:
          - experts:
              op: repeat
              var: e
              range: E
              body:
              - n_op_26:
                  op: moe_select_tokens
                  out:
                  - x_sel
                  - token_idx
                  - topk_pos
                  - sel_scores
                  in:
                  - x3
                  - topk_scores
                  - topk_indices
                  expert: e
              - n_use_27:
                  use: expert_ffn
                  in:
                    x: x_sel
                  out:
                    out_0: x_upd
              - n_op_28:
                  op: moe_scatter_add
                  out: m
                  in:
                  - m
                  - token_idx
                  - x_upd
                  - sel_scores
      - n_op_29:
          op: add
          out: out_0
          in:
          - x
          - m
      outputs:
        out_0: out_0
        present_kv: present_kv
