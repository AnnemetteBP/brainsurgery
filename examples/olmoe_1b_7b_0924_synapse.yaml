synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
    past_key_values:
      optional: true
    use_cache:
      optional: true
  graph:
  - n_op_1:
      _op: arange_positions
      _bind: pos_ids
      _args: input_ids
      attention_mask: attn_mask
  - n_op_2:
      _op: embedding
      _bind: x
      _args: input_ids
      dim: D
      _params:
        weight: model.embed_tokens.weight
  - n_op_3:
      _op: init_list
      _bind: present_key_values
  - model:
      graph:
      - layers:
          _op: repeat
          var: i
          range: L
          body:
          - n_op_4:
              _op: index
              _bind: past_i
              _args:
              - past_key_values
              - i
          - n_call_5:
              _op: call
              _target: olmoe_decoder_block
              _args:
              - x
              - pos_ids
              - attn_mask
              - past_i
              - use_cache
              _bind:
              - x
              - present_i
          - n_op_6:
              _op: append
              _bind: present_key_values
              _args:
              - present_key_values
              - present_i
              when: use_cache
          - n_op_7:
              _op: _ir_alias
              _args: present_key_values
              _bind: present_key_values
              when: not (use_cache)
  - n_call_8:
      _op: call
      _target: rms
      _args: x
      _bind: x
      path: '''model.norm'''
  - lm_head:
      _op: linear
      _bind: logits
      _args: x
  outputs:
    logits: logits
    present_key_values: present_key_values
  symbols:
    D: 2048
    V: 50304
    L: 16
    H: 16
    HD: 128
    E: 64
    EPT: 8
    C: 4096
    EPS: 1.0e-05
    THETA: 10000.0
    ATTN_SCALE: 0.08838834764831845
    B: null
    S: null
  blocks:
    Cache.update:
      inputs:
        past:
          optional: true
        k:
          optional: false
        v:
          optional: false
      graph:
      - n_op_1:
          _op: kv_cache_update
          _args:
          - past
          - k
          - v
          _bind:
          - k_all
          - v_all
          - present
      outputs:
        k_all: k_all
        v_all: v_all
        present: present
    Cache.coalesce:
      inputs:
        k_all:
          optional: true
        v_all:
          optional: true
        k:
          optional: false
        v:
          optional: false
      graph:
      - n_op_1:
          _op: coalesce
          _args:
          - k_all
          - v_all
          - k
          - v
          _bind:
          - k_ctx
          - v_ctx
      outputs:
        k_ctx: k_ctx
        v_ctx: v_ctx
    rms:
      inputs:
        x:
          optional: false
        path:
          optional: false
      graph:
      - n_op_1:
          _op: rmsnorm
          _bind: out_0
          _args: x
          eps: EPS
          dim: D
          param_base: path
      outputs:
        out_0: out_0
    expert_ffn:
      inputs:
        x:
          optional: false
      graph:
      - gate_proj:
          _op: linear
          _bind: gate
          _args: x
      - up_proj:
          _op: linear
          _bind: up
          _args: x
      - n_op_2:
          _op: activation
          _args: gate
          _bind: pipe_1
          kind: silu
      - n_op_4:
          _op: mul
          _bind: pipe_3
          _args:
          - pipe_1
          - up
      - down_proj:
          _op: linear
          _bind: out_0
          _args: pipe_3
          dim: D
      outputs:
        out_0: out_0
    olmoe_decoder_block:
      inputs:
        x:
          optional: false
        pos_ids:
          optional: false
        attn_mask:
          optional: true
        past_kv:
          optional: true
        use_cache:
          optional: true
      graph:
      - n_call_1:
          _op: call
          _target: rms
          _args: x
          _bind: x_norm
          path: '''input_layernorm'''
      - self_attn:
          graph:
          - q_proj:
              _op: linear
              _bind: pipe_2
              _args: x_norm
              dim: D
      - n_call_4:
          _op: call
          _target: rms
          _args: pipe_2
          _bind: pipe_3
          path: '''self_attn.q_norm'''
      - n_op_5:
          _op: reshape_heads
          _bind: q
          _args: pipe_3
          heads: H
      - self_attn:
          graph:
          - k_proj:
              _op: linear
              _bind: pipe_6
              _args: x_norm
              dim: D
      - n_call_8:
          _op: call
          _target: rms
          _args: pipe_6
          _bind: pipe_7
          path: '''self_attn.k_norm'''
      - n_op_9:
          _op: reshape_heads
          _bind: k
          _args: pipe_7
          heads: H
      - self_attn:
          graph:
          - v_proj:
              _op: linear
              _bind: pipe_10
              _args: x_norm
              dim: D
      - n_op_11:
          _op: reshape_heads
          _bind: v
          _args: pipe_10
          heads: H
      - n_op_12:
          _op: apply_rope_pair
          _bind:
          - qr
          - kr
          _args:
          - q
          - k
          position_ids: pos_ids
          theta: THETA
      - n_call_13:
          _op: call
          _target: Cache.update
          _args:
          - past_kv
          - kr
          - v
          _bind:
          - k_all
          - v_all
          - present_kv
          when: use_cache
      - n_call_14:
          _op: call
          _target: Cache.coalesce
          _args:
          - k_all
          - v_all
          - kr
          - v
          _bind:
          - k_coalesced
          - v_coalesced
      - n_op_15:
          _op: causal_mask
          _bind: mask
          _args: qr
          key: k_coalesced
          window: C
          padding_mask: attn_mask
      - n_op_17:
          _op: attention
          _bind: pipe_16
          _args:
          - qr
          - k_coalesced
          - v_coalesced
          mask: mask
          causal: true
          scale: ATTN_SCALE
      - n_op_18:
          _op: merge_heads
          _bind: a
          _args: pipe_16
      - self_attn:
          graph:
          - o_proj:
              _op: linear
              _bind: a
              _args: a
              dim: D
      - n_op_19:
          _op: add
          _bind: x
          _args:
          - x
          - a
      - n_call_20:
          _op: call
          _target: rms
          _args: x
          _bind: xn
          path: '''post_attention_layernorm'''
      - mlp:
          graph:
          - gate:
              _op: linear
              _bind: pipe_21
              _args: xn
              dim: E
      - n_op_23:
          _op: softmax
          _bind: pipe_22
          _args: pipe_21
          dim: -1
          dtype: float32
      - n_op_24:
          _op: topk
          _bind:
          - topk_scores
          - topk_indices
          _args: pipe_22
          k: EPT
          dim: -1
      - n_op_25:
          _op: zeros_like
          _bind: m
          _args: xn
      - mlp:
          graph:
          - experts:
              _op: repeat
              var: e
              range: E
              body:
              - n_op_26:
                  _op: moe_select_tokens
                  _bind:
                  - x_sel
                  - token_idx
                  - topk_pos
                  - sel_scores
                  _args:
                  - xn
                  - topk_scores
                  - topk_indices
                  expert: e
              - n_call_27:
                  _op: call
                  _target: expert_ffn
                  _args: x_sel
                  _bind: x_upd
              - n_op_28:
                  _op: moe_scatter_add
                  _bind: m
                  _args:
                  - m
                  - token_idx
                  - x_upd
                  - sel_scores
      - n_op_29:
          _op: add
          _bind: out_0
          _args:
          - x
          - m
      outputs:
        out_0: out_0
        present_kv: present_kv
