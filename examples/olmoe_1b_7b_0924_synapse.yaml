synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
    past_key_values:
      optional: true
    use_cache:
      optional: true
  graph:
  - n_op_1:
      op: arange_positions
      out: pos_ids
      in: input_ids
      attention_mask: attn_mask
  - model:
      graph:
      - embed_tokens:
          op: embedding
          out: x
          in: input_ids
          embedding_dim: D
  - n_op_2:
      op: init_list
      out: present_key_values
  - model:
      graph:
      - layers:
          op: repeat
          var: i
          range: L
          body:
          - n_op_3:
              op: index
              out: past_i
              in:
              - past_key_values
              - i
          - n_use_4:
              use: olmoe_decoder_block
              in:
                x: x
                pos_ids: pos_ids
                attn_mask: attn_mask
                past_kv: past_i
                use_cache: use_cache
              out:
                'y': x
                present_kv: present_i
          - n_op_5:
              op: append
              out: present_key_values
              in:
              - present_key_values
              - present_i
              when: use_cache
  - model:
      graph:
      - norm:
          op: rmsnorm
          out: x
          in: x
          eps: EPS
          dim: D
  - lm_head:
      op: linear
      out: logits
      in: x
  outputs:
    logits: logits
    present_key_values: present_key_values
  symbols:
    D: 2048
    V: 50304
    L: 16
    H: 16
    HD: 128
    E: 64
    EPT: 8
    C: 4096
    EPS: 1.0e-05
    THETA: 10000.0
    ATTN_SCALE: 0.08838834764831845
    B: null
    S: null
  blocks:
    olmoe_decoder_block:
      inputs:
        x:
          optional: false
        pos_ids:
          optional: false
        attn_mask:
          optional: true
        past_kv:
          optional: true
        use_cache:
          optional: true
      graph:
      - input_layernorm:
          op: rmsnorm
          out: x_norm
          in: x
          eps: EPS
          dim: D
      - self_attn:
          graph:
          - q_proj:
              op: linear
              out: pipe_1
              in: x_norm
              dim: D
      - self_attn:
          graph:
          - q_norm:
              op: rmsnorm
              out: pipe_2
              in: pipe_1
              eps: EPS
              dim: D
      - n_op_3:
          op: reshape_heads
          out: q
          in: pipe_2
          heads: H
      - self_attn:
          graph:
          - k_proj:
              op: linear
              out: pipe_4
              in: x_norm
              dim: D
      - self_attn:
          graph:
          - k_norm:
              op: rmsnorm
              out: pipe_5
              in: pipe_4
              eps: EPS
              dim: D
      - n_op_6:
          op: reshape_heads
          out: k
          in: pipe_5
          heads: H
      - self_attn:
          graph:
          - v_proj:
              op: linear
              out: pipe_7
              in: x_norm
              dim: D
      - n_op_8:
          op: reshape_heads
          out: v
          in: pipe_7
          heads: H
      - n_op_9:
          op: apply_rope_pair
          out:
          - qr
          - kr
          in:
          - q
          - k
          position_ids: pos_ids
          theta: THETA
      - n_op_10:
          op: kv_cache_update
          in:
          - past_kv
          - kr
          - v
          out:
          - k_all
          - v_all
          - present_kv
      - n_op_11:
          op: coalesce
          in:
          - k_all
          - v_all
          - kr
          - v
          out:
          - k_coalesced
          - v_coalesced
      - n_op_12:
          op: causal_mask
          out: mask
          in: qr
          key: k_coalesced
          window: C
          padding_mask: attn_mask
      - n_op_14:
          op: attention
          out: pipe_13
          in:
          - qr
          - k_coalesced
          - v_coalesced
          mask: mask
          causal: true
          scale: ATTN_SCALE
      - n_op_15:
          op: merge_heads
          out: a
          in: pipe_13
      - self_attn:
          graph:
          - o_proj:
              op: linear
              out: a
              in: a
              dim: D
      - n_op_16:
          op: add
          out: x
          in:
          - x
          - a
      - post_attention_layernorm:
          op: rmsnorm
          out: x3
          in: x
          eps: EPS
          dim: D
      - mlp:
          graph:
          - gate:
              op: linear
              out: pipe_17
              in: x3
              dim: E
      - n_op_19:
          op: softmax
          out: pipe_18
          in: pipe_17
          dim: -1
          dtype: float32
      - n_op_20:
          op: topk
          out:
          - topk_scores
          - topk_indices
          in: pipe_18
          k: EPT
          dim: -1
      - n_op_21:
          op: zeros_like
          out: m
          in: x3
      - mlp:
          graph:
          - experts:
              op: repeat
              var: e
              range: E
              body:
              - n_op_22:
                  op: moe_select_tokens
                  out:
                  - x_sel
                  - token_idx
                  - topk_pos
                  - sel_scores
                  in:
                  - x3
                  - topk_scores
                  - topk_indices
                  expert: e
              - gate_proj:
                  op: linear
                  out: gate
                  in: x_sel
              - up_proj:
                  op: linear
                  out: up
                  in: x_sel
              - n_op_24:
                  op: activation
                  in: gate
                  out: pipe_23
                  kind: silu
              - n_op_26:
                  op: mul
                  out: pipe_25
                  in:
                  - pipe_23
                  - up
              - down_proj:
                  op: linear
                  out: x_upd
                  in: pipe_25
              - n_op_27:
                  op: moe_scatter_add
                  out: m
                  in:
                  - m
                  - token_idx
                  - x_upd
                  - sel_scores
      - n_op_28:
          op: add
          out: 'y'
          in:
          - x
          - m
      outputs:
        'y': 'y'
        present_kv: present_kv
