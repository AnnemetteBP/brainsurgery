synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
    past_key_values:
      optional: true
    use_cache:
      optional: true
  graph:
  - n_op_1:
      op: arange_positions
      out: pos_ids
      in: input_ids
      attention_mask: attn_mask
  - model:
      graph:
      - embed_tokens:
          op: embedding
          out: x
          in: input_ids
          num_embeddings: V
          embedding_dim: D
  - n_op_2:
      op: init_list
      out: present_key_values
  - model:
      graph:
      - layers:
          op: repeat
          var: i
          range: L
          body:
          - n_op_3:
              op: index
              out: past_i
              in:
              - past_key_values
              - i
          - n_use_4:
              use: olmoe_decoder_block
              in:
                x: x
                pos_ids: pos_ids
                attn_mask: attn_mask
                past_kv: past_i
                use_cache: use_cache
              out:
                'y': x
                present_kv: present_i
          - n_op_5:
              op: append
              out: present_key_values
              in:
              - present_key_values
              - present_i
              when: use_cache
  - model:
      graph:
      - norm:
          op: rmsnorm
          out: pipe_6
          in: x
          eps: EPS
          dim: D
  - n_op_7:
      op: linear
      out: logits
      in: pipe_6
      out_features: V
      tie_weight: lm_head.weight
  outputs:
    logits: logits
    present_key_values: present_key_values
  symbols:
    D: 2048
    V: 50304
    L: 16
    H: 16
    HD: 128
    E: 64
    EPT: 8
    C: 4096
    EPS: 1.0e-05
    B: null
    S: null
  blocks:
    olmoe_decoder_block:
      inputs:
        x:
          optional: false
        pos_ids:
          optional: false
        attn_mask:
          optional: true
        past_kv:
          optional: true
        use_cache:
          optional: true
      graph:
      - input_layernorm:
          op: rmsnorm
          out: x_norm
          in: x
          eps: EPS
          dim: D
      - self_attn:
          graph:
          - q_proj:
              op: linear
              out: q_lin
              in: x_norm
              out_features: D
      - self_attn:
          graph:
          - k_proj:
              op: linear
              out: k_lin
              in: x_norm
              out_features: D
      - self_attn:
          graph:
          - v_proj:
              op: linear
              out: v_lin
              in: x_norm
              out_features: D
      - self_attn:
          graph:
          - q_norm:
              op: rmsnorm
              out: pipe_1
              in: q_lin
              eps: EPS
              dim: D
      - n_op_2:
          op: reshape_heads
          out: q
          in: pipe_1
          heads: H
      - self_attn:
          graph:
          - k_norm:
              op: rmsnorm
              out: pipe_3
              in: k_lin
              eps: EPS
              dim: D
      - n_op_4:
          op: reshape_heads
          out: k
          in: pipe_3
          heads: H
      - n_op_5:
          op: reshape_heads
          out: v
          in: v_lin
          heads: H
      - n_op_6:
          op: apply_rope_pair
          out:
          - qr
          - kr
          in:
          - q
          - k
          position_ids: pos_ids
          theta: 10000.0
      - n_op_7:
          op: kv_cache_update
          in:
          - past_kv
          - kr
          - v
          out:
          - k_all
          - v_all
          - present_kv
      - n_op_8:
          op: coalesce_triplet
          in:
          - k_all
          - v_all
          - kr
          - v
          out:
          - k_coalesced
          - v_coalesced
      - n_op_9:
          op: causal_mask
          out: mask
          in: qr
          key: k_coalesced
          window: C
          padding_mask: attn_mask
      - n_op_11:
          op: attention
          out: pipe_10
          in:
          - qr
          - k_coalesced
          - v_coalesced
          mask: mask
          causal: true
          scale: 0.08838834764831845
      - n_op_13:
          op: merge_heads
          out: pipe_12
          in: pipe_10
      - self_attn:
          graph:
          - o_proj:
              op: linear
              out: a
              in: pipe_12
              out_features: D
      - n_op_14:
          op: add
          out: x2
          in:
          - x
          - a
      - post_attention_layernorm:
          op: rmsnorm
          out: x3
          in: x2
          eps: EPS
          dim: D
      - mlp:
          graph:
          - gate:
              op: linear
              out: router_logits
              in: x3
              out_features: E
      - n_op_15:
          op: softmax
          out: router_probs
          in: router_logits
          dim: -1
          dtype: float32
      - n_op_16:
          op: topk
          out:
          - topk_scores
          - topk_indices
          in: router_probs
          k: EPT
          dim: -1
      - n_op_17:
          op: zeros_like
          out: m
          in: x3
      - mlp:
          graph:
          - experts:
              op: repeat
              var: e
              range: E
              body:
              - n_op_18:
                  op: moe_select_tokens
                  out:
                  - x_sel
                  - token_idx
                  - topk_pos
                  - sel_scores
                  in:
                  - x3
                  - topk_scores
                  - topk_indices
                  expert: e
              - n_op_19:
                  op: moe_expert_ffn
                  out: x_upd
                  in: x_sel
                  expert: e
                  experts_scope: ''
                  activation: silu
              - n_op_20:
                  op: moe_scatter_add
                  out: m
                  in:
                  - m
                  - token_idx
                  - x_upd
                  - sel_scores
      - n_op_21:
          op: add
          out: 'y'
          in:
          - x2
          - m
      outputs:
        'y': 'y'
        present_kv: present_kv
