synapse: 1
model:
  inputs:
    input_ids:
      optional: false
    attn_mask:
      optional: true
    past_key_values:
      optional: true
    use_cache:
      optional: true
  graph:
  - n_call_2:
      _op: call
      _target: Cache.past_length
      _args: past_key_values
      _bind: kwarg_1
  - n_op_3:
      _op: position_ids
      _bind: pos_ids
      _args:
      - input_ids
      - attn_mask
      past_length: kwarg_1
  - n_op_4:
      _op: embedding
      _bind: x
      _args: input_ids
      dim: D
      _params:
        weight: model.embed_tokens.weight
  - n_op_5:
      _op: init_list
      _bind: present_key_values
  - n_for_10:
      _op: for
      _scope: model.layers
      _var: i
      _to: L
      _body:
      - n_op_6:
          _op: index
          _bind: past_i
          _args:
          - past_key_values
          - i
      - n_call_7:
          _op: call
          _target: olmoe_decoder_block
          _args:
          - x
          - pos_ids
          - attn_mask
          - past_i
          - use_cache
          _bind:
          - x
          - present_i
      - n_op_8:
          _op: append
          _bind: present_key_values
          _args:
          - present_key_values
          - present_i
          when: use_cache
      - n_op_9:
          _op: _ir_alias
          _args: present_key_values
          _bind: present_key_values
          when: not (use_cache)
  - n_call_11:
      _op: rmsnorm
      _bind: x
      _args: x
      eps: EPS
      dim: D
      _params:
        weight: model.norm.weight
  - n_op_12:
      _op: linear
      _bind: logits
      _args: x
      _params:
        weight: lm_head.weight
  outputs:
    logits: logits
    present_key_values: present_key_values
  symbols:
    D: 2048
    V: 50304
    L: 16
    H: 16
    HD: 128
    E: 64
    EPT: 8
    C: 4096
    EPS: 1.0e-05
    THETA: 10000.0
    ATTN_SCALE: 0.08838834764831845
    B: null
    S: null
  blocks:
    Cache.update:
      inputs:
        past:
          optional: true
        k:
          optional: false
        v:
          optional: false
      graph:
      - n_op_1:
          _op: kv_cache_update
          _args:
          - past
          - k
          - v
          _bind:
          - k_all
          - v_all
          - present
      outputs:
        k_all: k_all
        v_all: v_all
        present: present
    Cache.coalesce:
      inputs:
        k_all:
          optional: true
        v_all:
          optional: true
        k:
          optional: false
        v:
          optional: false
      graph:
      - n_op_1:
          _op: coalesce
          _args:
          - k_all
          - v_all
          - k
          - v
          _bind:
          - k_ctx
          - v_ctx
      outputs:
        k_ctx: k_ctx
        v_ctx: v_ctx
    Cache.past_length:
      inputs:
        cache:
          optional: true
      graph:
      - n_op_1:
          _op: index
          _bind: first
          _args:
          - cache
          - '0'
      - n_op_2:
          _op: kv_seq_len
          _args: first
          _bind: out_0
      outputs:
        out_0: out_0
    expert_ffn:
      inputs:
        x:
          optional: false
      graph:
      - n_op_1:
          _op: linear
          _bind: gate
          _args: x
          _params:
            weight: gate_proj.weight
      - n_op_2:
          _op: linear
          _bind: up
          _args: x
          _params:
            weight: up_proj.weight
      - n_op_4:
          _op: activation
          _args: gate
          _bind: pipe_3
          kind: silu
      - n_op_6:
          _op: mul
          _bind: pipe_5
          _args:
          - pipe_3
          - up
      - n_op_7:
          _op: linear
          _bind: out_0
          _args: pipe_5
          dim: D
          _params:
            weight: down_proj.weight
      outputs:
        out_0: out_0
    olmoe_decoder_block:
      inputs:
        x:
          optional: false
        pos_ids:
          optional: false
        attn_mask:
          optional: true
        past_kv:
          optional: true
        use_cache:
          optional: true
      graph:
      - n_call_1:
          _op: rmsnorm
          _bind: x_norm
          _args: x
          eps: EPS
          dim: D
          _params:
            weight: input_layernorm.weight
      - n_op_3:
          _op: linear
          _bind: pipe_2
          _args: x_norm
          dim: D
          _params:
            weight: self_attn.q_proj.weight
      - n_call_5:
          _op: rmsnorm
          _bind: pipe_4
          _args: pipe_2
          eps: EPS
          dim: D
          _params:
            weight: self_attn.q_norm.weight
      - n_op_6:
          _op: reshape_heads
          _bind: q
          _args: pipe_4
          heads: H
      - n_op_8:
          _op: linear
          _bind: pipe_7
          _args: x_norm
          dim: D
          _params:
            weight: self_attn.k_proj.weight
      - n_call_10:
          _op: rmsnorm
          _bind: pipe_9
          _args: pipe_7
          eps: EPS
          dim: D
          _params:
            weight: self_attn.k_norm.weight
      - n_op_11:
          _op: reshape_heads
          _bind: k
          _args: pipe_9
          heads: H
      - n_op_13:
          _op: linear
          _bind: pipe_12
          _args: x_norm
          dim: D
          _params:
            weight: self_attn.v_proj.weight
      - n_op_14:
          _op: reshape_heads
          _bind: v
          _args: pipe_12
          heads: H
      - n_op_15:
          _op: apply_rope_pair
          _bind:
          - qr
          - kr
          _args:
          - q
          - k
          position_ids: pos_ids
          theta: THETA
      - n_call_16:
          _op: call
          _target: Cache.update
          _args:
          - past_kv
          - kr
          - v
          _bind:
          - k_all
          - v_all
          - present_kv
          when: use_cache
      - n_call_17:
          _op: call
          _target: Cache.coalesce
          _args:
          - k_all
          - v_all
          - kr
          - v
          _bind:
          - k_coalesced
          - v_coalesced
      - n_op_18:
          _op: causal_mask
          _bind: mask
          _args:
          - qr
          - k_coalesced
          window: C
          padding_mask: attn_mask
      - n_op_20:
          _op: attention
          _bind: pipe_19
          _args:
          - qr
          - k_coalesced
          - v_coalesced
          mask: mask
          causal: true
          scale: ATTN_SCALE
      - n_op_21:
          _op: merge_heads
          _bind: a
          _args: pipe_19
      - n_op_22:
          _op: linear
          _bind: a
          _args: a
          dim: D
          _params:
            weight: self_attn.o_proj.weight
      - n_op_23:
          _op: add
          _bind: x
          _args:
          - x
          - a
      - n_call_24:
          _op: rmsnorm
          _bind: xn
          _args: x
          eps: EPS
          dim: D
          _params:
            weight: post_attention_layernorm.weight
      - n_op_26:
          _op: linear
          _bind: pipe_25
          _args: xn
          dim: E
          _params:
            weight: mlp.gate.weight
      - n_op_28:
          _op: softmax
          _bind: pipe_27
          _args: pipe_25
          dim: -1
          dtype: float32
      - n_op_29:
          _op: topk
          _bind:
          - topk_scores
          - topk_indices
          _args: pipe_27
          k: EPT
          dim: -1
      - n_op_30:
          _op: zeros_like
          _bind: m
          _args: xn
      - n_for_34:
          _op: for
          _scope: mlp.experts
          _var: e
          _to: E
          _body:
          - n_op_31:
              _op: moe_select_tokens
              _bind:
              - x_sel
              - token_idx
              - topk_pos
              - sel_scores
              _args:
              - xn
              - topk_scores
              - topk_indices
              expert: e
          - n_call_32:
              _op: call
              _target: expert_ffn
              _args: x_sel
              _bind: x_upd
          - n_op_33:
              _op: moe_scatter_add
              _bind: m
              _args:
              - m
              - token_idx
              - x_upd
              - sel_scores
      - n_op_35:
          _op: add
          _bind: out_0
          _args:
          - x
          - m
      outputs:
        out_0: out_0
        present_kv: present_kv
